<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<meta property="og:site_name" content="올라가냥">
<meta property="og:title" content="올라가냥">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0b0d1a;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
  /* 모바일 더블탭 확대 방지: 자식 요소는 body의 touch-action을 상속하지 않으므로 탭 받는 요소에 명시 */
  canvas,button,.ch,input{touch-action:manipulation}
  #wrap{position:relative;width:100%;height:100%;margin:0 auto;overflow:hidden;background:#bfe0ef}
  /* 폰: 항상 화면 꽉 채움(터치=pointer:coarse). 넓은 화면 데스크톱(pointer:fine)만 폰 모양 세로 컬럼으로. */
  /* ※ 모바일에서 키보드가 뜨면 화면 비율이 가로로 변해 레터박스가 잘못 켜지면서 팝업이 작아지던 버그 → pointer:fine 게이트로 차단 */
  @media (min-aspect-ratio:3/5) and (pointer:fine){ #wrap{width:auto;height:100%;aspect-ratio:9/19} }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;image-rendering:auto}
  /* v2 구름잠: 상단 점수/게이지 DOM HUD + 하단 버튼 제거 → 캔버스에 직접 그림(달 게이지·기분 핍·고도) */
  #hud,#coinHud,#gaugeWrap{display:none!important}
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:5;pointer-events:none;color:#fff;
       padding-top:env(safe-area-inset-top)}
  #score{font-size:54px;font-weight:900;letter-spacing:1px;text-align:center;line-height:1.05;margin-top:8px;color:#fff7ea;
    -webkit-text-stroke:3px #6b4a2b;paint-order:stroke fill;text-shadow:0 4px 0 rgba(107,74,43,.4)}
  #best{font-size:13px;font-weight:700;text-align:center;margin-top:2px;color:#fff;opacity:.92;
    text-shadow:0 2px 3px rgba(0,0,0,.5)}
  #coinHud{position:absolute;left:12px;top:calc(10px + env(safe-area-inset-top));z-index:7;display:flex;align-items:center;gap:5px;
    background:rgba(0,0,0,.32);padding:5px 12px 5px 8px;border-radius:16px}
  #coinHud img{width:20px;height:22px;image-rendering:auto}
  #coinHud span{font-size:17px;font-weight:800;color:#ffe27a;text-shadow:0 2px 2px rgba(0,0,0,.6)}
  #muteBtn{position:absolute;right:12px;top:calc(10px + env(safe-area-inset-top));z-index:7;width:38px;height:38px;border:none;
    border-radius:12px;background:rgba(0,0,0,.32);color:#fff;font-size:18px;cursor:pointer;line-height:38px;text-align:center}
  #pauseBtn{position:absolute;right:56px;top:calc(10px + env(safe-area-inset-top));z-index:7;width:38px;height:38px;border:none;
    border-radius:12px;background:rgba(60,42,26,.42);color:#fff7e8;font-size:14px;line-height:38px;text-align:center;letter-spacing:1px;cursor:pointer}
  /* 시작 연출: START! 텍스트 + 튜토리얼 손가락 */
  #startText{position:absolute;left:50%;top:33%;z-index:9;pointer-events:none;opacity:0;transform:translate(-50%,-50%);
    font-size:46px;font-weight:900;color:#ffcf5a;-webkit-text-stroke:3px #5a3a1a;paint-order:stroke fill;white-space:nowrap;text-shadow:0 5px 0 rgba(90,58,26,.4)}
  #startText.show{animation:startpop 1.1s ease-out forwards}
  @keyframes startpop{0%{opacity:0;transform:translate(-50%,-50%) scale(1.6)}18%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    72%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.15)}}
  #tutHand{position:absolute;z-index:11;width:64px;pointer-events:none;display:none;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));right:26px;bottom:44px}
  #tutHand.show{display:block;animation:taphand .8s ease-in-out infinite}
  @keyframes taphand{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(10px) scale(.9)}}
  /* gauge: real ui_guageBG frame + ui_guageBar fill */
  #gaugeWrap{position:absolute;left:50%;transform:translateX(-50%);top:96px;z-index:6;
    width:264px;height:34px;border-radius:17px;background:#fff3dc;border:3px solid #5a3a1a;
    box-shadow:0 4px 0 rgba(90,58,26,.35),inset 0 2px 4px rgba(255,255,255,.6)}
  #gaugeClip{position:absolute;left:5px;top:5px;width:250px;height:21px;overflow:hidden;border-radius:11px}
  #gaugeFill,#gaugeFx{position:absolute;left:0;top:0;height:100%;width:100%;transform-origin:left center}
  #gaugeFill{background:linear-gradient(#ffd66b,#f6a93b);box-shadow:inset 0 -3px 0 rgba(198,127,27,.5)}
  #gaugeFx{opacity:0;background:rgba(255,255,255,.55)}
  /* on-screen controls — 하단 양 구석 둥근 나무 아이콘 버튼 (↻ 전환 / ▲ 오르기) */
  #btns{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;
    z-index:10;padding:0 1.6%;padding-bottom:calc(6px + env(safe-area-inset-bottom));pointer-events:none}
  /* 하단 버튼: 화면 디자인 폭의 약 30% */
  #btns button{pointer-events:auto;width:30%;aspect-ratio:192/204;height:auto;border:none;background-color:transparent;outline:none;cursor:pointer;
    background-repeat:no-repeat;background-position:center;background-size:contain;
    -webkit-tap-highlight-color:transparent;transition:transform .04s,filter .04s;
    filter:drop-shadow(0 4px 2px rgba(0,0,0,.35))}
  #btns button:active{transform:translateY(4px) scale(.96);filter:brightness(1.12) drop-shadow(0 2px 1px rgba(0,0,0,.3))}
  #btnTurn{background-image:url('assets/ui/btn_turn.png')}   
  #btnUp{background-image:url('assets/ui/btn_up.png')}       
  /* overlays */
  .overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;background:rgba(46,36,25,.6);backdrop-filter:blur(2px)}
  .overlay.hidden{display:none}
  .overlay h1{font-size:34px;font-weight:900;margin-bottom:8px;text-shadow:0 3px 0 rgba(0,0,0,.35)}
  #start{justify-content:flex-start;overflow-y:auto;padding:calc(34px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom))}
  #start h1{font-size:clamp(30px,8.5vw,40px);line-height:1.12;margin-bottom:14px}
  .overlay p{font-size:15px;opacity:.9;margin-bottom:20px;line-height:1.6}
  #start p{max-width:min(92vw,390px);font-size:14px;margin-bottom:14px}
  #start.p0Start{justify-content:flex-end;overflow:hidden;padding:0 20px calc(28px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(20,28,46,.08),rgba(20,28,46,.13) 42%,rgba(20,28,46,.68));backdrop-filter:none}
  .p0Hidden{display:none!important}
  .startCard.hidden,.p0Card.hidden{display:none!important}
  .startCard{width:100%;max-width:380px;padding:22px 16px 18px;border-radius:24px;background:rgba(18,28,52,.86);

  #start .startCard h1{margin:0 0 12px;font-size:38px;line-height:1.05;text-shadow:0 3px 0 rgba(0,0,0,.35)}
  .startCard #startBtn,.startCard #openInviteBtn{width:100%;height:56px;border:0;border-radius:17px;font-size:18px;font-weight:900;padding:0}
  .startCard #startBtn{background:#e8b45c;color:#18223b;box-shadow:0 5px 0 #c98b3f}
  .startCard #openInviteBtn{margin-top:10px;background:#fff;color:#20304f;border:2px solid #20304f;box-shadow:0 4px 0 rgba(12,19,36,.32)}
  .p0Card{width:100%;max-width:380px;background:#fff;color:#16213a;border:3px solid #20304f;border-radius:24px;
    box-shadow:0 10px 0 rgba(25,37,62,.36);padding:18px 16px 16px;text-align:left}
  #start.p0Start .p0Card h1{font-size:34px;line-height:1.12;margin:0 0 -2px;font-weight:900;letter-spacing:0;color:#16213a;text-shadow:none}
  .p0SpritePreview{height:126px;position:relative;margin:-4px 0 10px;overflow:visible;display:flex;align-items:center;justify-content:center;gap:8px}
  .p0SourcePhoto{position:relative;width:82px;height:82px;border-radius:18px;border:4px solid #fff;background:#fff;
    box-shadow:0 6px 0 rgba(28,42,70,.22);overflow:hidden;transform:rotate(-5deg);z-index:2;flex:0 0 82px}
  .p0SourcePhoto img{width:100%;height:100%;object-fit:cover}
  .p0Arrow{position:relative;font-size:32px;font-weight:900;color:#4a90e8;text-shadow:0 2px 0 #fff;z-index:3}
  .p0SpriteFrame{position:relative;width:160px;height:126px;display:flex;align-items:flex-end;justify-content:center;
    animation:p0IdleBob .9s steps(2,end) infinite;flex:0 0 160px}
  .p0SpriteFrame img{height:122px;width:auto;object-fit:contain;image-rendering:auto;filter:drop-shadow(0 9px 0 rgba(28,42,70,.2))}
  @keyframes p0IdleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .p0Upload{min-height:130px;border:2px dashed #6aa9f5;border-radius:18px;background:#eef7ff;display:flex;align-items:center;
    gap:13px;padding:12px;margin-bottom:12px;cursor:pointer}
  .p0Card:not([data-step="photo"]) .p0Upload{min-height:86px;padding:10px 12px}
  .p0Card:not([data-step="photo"]) .p0Upload span{display:none}
  .p0Plus{width:50px;height:50px;flex:0 0 50px;border-radius:16px;background:#fff;border:2px solid #20304f;display:grid;place-items:center;
    color:#3f8de8;font-size:32px;font-weight:900;line-height:1;box-shadow:0 3px 0 #d4deeb}
  .p0Card:not([data-step="photo"]) .p0Plus{width:44px;height:44px;flex-basis:44px;border-radius:14px;font-size:28px}
  .p0Upload b{display:block;font-size:18px;margin-bottom:4px;color:#17213a}
  .p0Upload span{display:block;font-size:12px;line-height:1.38;font-weight:900;color:#66758f}
  .p0SelectedPhoto{display:flex;align-items:center;gap:8px;margin-top:8px}
  .p0SelectedPhoto.hidden{display:none}
  #photoPreviewGrid{display:flex;align-items:center;gap:5px;max-width:184px;overflow:hidden}
  #photoPreviewGrid img{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid rgba(32,48,79,.18)}
  #photoCount{color:#52617a;font-size:12px;font-weight:900;text-shadow:none;white-space:nowrap}
  #catPhotoInput{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
  #catNameInput{width:100%;height:52px;border:2px solid #20304f;border-radius:17px;background:#fff;padding:0 15px;margin-bottom:13px;
    font-size:18px;font-weight:900;color:#16213a;outline:none}
  #catNameInput::placeholder{color:#a2adbf}
  .p0Card[data-step="photo"] #catNameInput,
  .p0Card[data-step="photo"] #genBtn,
  .p0Card[data-step="photo"] #googlePanel,
  .p0Card[data-step="name"] #genBtn,
  .p0Card[data-step="name"] #googlePanel,
  .p0Card[data-step="invite"] #googlePanel,
  .p0Card[data-step="login"] #genBtn,
  .p0Card[data-step="done"] #googlePanel{display:none}
  #genStatus.p0Status{display:none;margin:0 2px 10px;font-size:12px;line-height:1.35;color:#66758f;font-weight:900;text-shadow:none}
  #genStatus.p0Status.error{display:block;color:#c6382f}
  #genBtn{height:56px;width:100%;border:0;border-radius:17px;background:#e8b45c;color:#18223b;font-size:18px;font-weight:900;
    box-shadow:0 5px 0 #c98b3f;padding:0;display:block}
  #genBtn:disabled{opacity:.68;filter:saturate(.6);cursor:progress}
  #googlePanel{margin:10px 0 0;padding:12px;border-radius:18px;background:#f3f7ff;border:2px solid #c8e3ff;text-align:center}
  #googlePanel.hidden{display:none}
  #googlePanel b{display:block;margin-bottom:8px;font-size:14px;color:#17213a}
  #googleButton{display:flex;justify-content:center;min-height:40px}
  #devGoogleBtn{height:42px;border-radius:21px;background:#fff;border:2px solid #20304f;color:#17213a;font-size:14px;font-weight:900;
    box-shadow:0 3px 0 #d4deeb;padding:0 16px}
  .overlay .big{font-size:72px;font-weight:900;margin:2px 0;text-shadow:0 4px 0 rgba(0,0,0,.35)}
  .overlay .sub{font-size:15px;opacity:.85;margin-bottom:6px}
  .overlay .sub2{font-size:14px;opacity:.8;margin-bottom:22px;color:#ffe27a}
  .overlay button{padding:15px 40px;border:none;border-radius:32px;font-size:19px;font-weight:800;color:#fff;cursor:pointer;
    background:linear-gradient(180deg,#e8b45c,#dd9a44);box-shadow:0 5px 0 #b9772f}
  .overlay button:active{transform:translateY(3px);box-shadow:0 2px 0 #b9772f}
  .overlay button.ghost{margin-top:12px;padding:10px 24px;font-size:15px;background:rgba(255,255,255,.14);
    box-shadow:none;border:1px solid rgba(255,255,255,.35)}
  .overlay button.ghost:active{transform:translateY(2px)}
  /* ===== 게임오버 결과 팝업 (중앙 팝업 + 스케일인, 점수/최고/코인 + 부활·다시하기·홈) ===== */
  /* result_panel.png는 실제 팝업 배경이 아니라 보상 아이템 콜라주 스프라이트(실타래/GEM)라 부적합 → 크림색 CSS 패널 유지 */
  #overPanel{position:relative;width:300px;max-width:84%;padding:30px 22px 20px;border-radius:20px;
    background:linear-gradient(180deg,#fff7e6,#ffe6bd);border:4px solid #8a5a2b;
    box-shadow:0 10px 0 rgba(0,0,0,.28),inset 0 0 0 3px #ffd99a;color:#5a3a1c;text-align:center;transform:scale(.7);opacity:0}
  #over:not(.hidden) #overPanel{animation:ovpop .42s cubic-bezier(.2,1.45,.4,1) forwards}
  @keyframes ovpop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:1}}
  /* 신기록 스탬프: 깨진 new_record 스프라이트 대신 빨간 CSS 라운드 텍스트 스탬프 */
  #newRecord{position:absolute;top:-18px;left:50%;z-index:3;
    transform:translateX(-50%) rotate(-8deg);
    padding:5px 14px;border-radius:16px;background:linear-gradient(180deg,#ff5a4d,#e02718);
    border:2px solid #fff;color:#fff;font-size:15px;font-weight:900;letter-spacing:1px;white-space:nowrap;
    text-shadow:0 1px 1px rgba(0,0,0,.35);box-shadow:0 3px 4px rgba(0,0,0,.35);
    animation:nrPop .45s cubic-bezier(.2,1.6,.4,1) .15s backwards}
  #newRecord.hidden{display:none}
  @keyframes nrPop{0%{transform:translateX(-50%) rotate(-8deg) scale(.2);opacity:0}100%{transform:translateX(-50%) rotate(-8deg) scale(1);opacity:1}}
  /* 플레이한 캐릭터 아이콘 */
  #overChar{display:block;margin:0 auto 4px;width:118px;height:92px;object-fit:contain;image-rendering:auto;
    filter:drop-shadow(0 3px 3px rgba(107,74,43,.25))}
  /* SCORE 라벨: 깨진 label_score 스프라이트 대신 CSS 텍스트 */
  .ovScoreLabel{display:block;margin:0 auto 2px;font-size:14px;font-weight:800;letter-spacing:3px;color:#b9842f}
  /* 점수 줄 */
  #scoreRow{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 0 12px}
  #finalScore{font-size:62px;line-height:1.05;font-weight:900;color:#e9923f;text-shadow:0 3px 0 #b9651f}
  #overStats{margin:0 4px 16px}
  .ovRow{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:800;
    padding:8px 12px;border-radius:10px;background:rgba(138,90,43,.10);margin-top:6px}
  .ovRow .ovKey{display:flex;align-items:center;gap:5px;color:#7a5630}
  .ovRow .ovVal{color:#3a2410}
  .coinMini{width:18px;height:18px;image-rendering:auto;vertical-align:middle}
  #overBtns{display:flex;gap:10px;justify-content:center}
  .ovBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 4px 9px;border:none;
    border-radius:14px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.28);transition:transform .05s}
  .ovBtn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.28)}
  .ovBtn img{width:34px;height:34px;image-rendering:auto;object-fit:contain}
  .ovBtn span{white-space:nowrap}
  .ovBtn.hidden{display:none}
  .ovRevive{background:linear-gradient(180deg,#5ad07a,#2fa54f)}
  .ovRetry{background:linear-gradient(180deg,#e8b45c,#dd9a44)}
  .ovHome{background:linear-gradient(180deg,#9fb4c4,#6d8499)}
  #overInviteBtn{width:100%;height:48px;margin-top:12px;border-radius:15px;border:2px solid #8a5a2b;background:#fff;color:#5a3a1c;
    box-shadow:0 4px 0 rgba(90,58,28,.24);font-size:15px;font-weight:900;padding:0}
  .csLabel{font-size:15px;font-weight:800;opacity:.9;margin-bottom:10px;letter-spacing:1px}
  #charSel{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;max-width:min(92vw,390px)}
  #charSel .ch{width:98px;height:112px;border-radius:16px;background:#fff7ec;
    border:2px solid #e9c9a6;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    cursor:pointer;padding-bottom:7px;transition:transform .12s cubic-bezier(.2,1.4,.4,1);box-shadow:0 3px 0 rgba(201,139,63,.25)}
  #charSel .ch:active{transform:scale(.95)}
  #charSel .ch.sel{border-color:#e8b45c;background:#fff0d6;transform:translateY(-4px);box-shadow:0 7px 0 rgba(201,139,63,.35),0 0 14px rgba(232,180,92,.55)}
  #charSel .ch img{height:62px;image-rendering:auto;object-fit:contain;margin-top:auto}
  #charSel .ch span{font-size:13px;font-weight:900;margin-top:2px;color:#6b4a2b;white-space:nowrap}

  #startBtn{min-width:160px}
  #genBox{width:min(92vw,390px);margin:0 auto 14px;padding:10px 12px;border-radius:16px;
    background:rgba(0,0,0,.18);border:2px solid rgba(255,255,255,.16);display:grid;gap:8px}
  #genPreview{width:64px;height:64px;margin:0 auto 2px;object-fit:contain;image-rendering:auto;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.35))}
  #genPreview.hidden{display:none}
  #photoPreviewWrap{display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px}

  #genTop{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
  #genBox .genFile,#genBox button{height:40px;padding:0 14px;border-radius:20px;font-size:14px;font-weight:800;

  #genBox button{min-width:96px;box-shadow:0 3px 0 #b9772f}

  #genBox button:disabled{opacity:.62;filter:saturate(.55);cursor:progress}

<body>
<div id="wrap">

<script>

/* =====================================================================
   올라가냥 — 고양이 계단 오르기 캐주얼 게임
   두 버튼(올라가기 / 방향 전환)으로 끝없이 위로 오르는 아케이드 게임.
   캐릭터 3종(체리·라떼·닐라)과 사진 기반 '우리 냥이 초대' 기능 포함.
   ===================================================================== */

// ---------- 게임 상수 ----------
const GAUGE_START=0.5, GUAGE_SPEED0=0.12, GUAGE_REFILL=0.13, GUAGE_MAX=1.0, MAX_ADD_SPEED=1.1;
function rampParams(score){                       // _checkIncreaseSpeed 마일스톤
  if(score>=501) return {addSpeed:0.01,maxCount:100};
  if(score>=320) return {addSpeed:0.01,maxCount:20};
  if(score>=100) return {addSpeed:0.04,maxCount:20};
  return {addSpeed:0.05,maxCount:20};
}
const FALL_TIME=1.8, SCROLL_FAST=0.61, SCROLL_SLOW=0.15, SCROLL_FAST_UNTIL=11;
const COIN_MIN_STAIR=10;                          // _createCoin: stair<10 코인 없음
// 로켓 아이템: 먹으면 타고 부스트 상승 → 가까운 발판 착지 → 3·2·1 카운트 → 게이지 재개
const ROCKET_MIN_STAIR=22, ROCKET_GAP=40, ROCKET_RATE=0.06, ROCKET_BOOST=24, ROCKET_DUR=1.35, COUNT_STEP=0.8;
let lastRocketStair=-999;
function coinRoll(stair){                          // _createCoin 확률 (roll/1000)
  const roll=(Math.random()*1000)|0;
  const tBig = stair<=199?15:(stair<=499?10:20);
  const tNorm= stair<200?150:100;
  if(roll<tBig)  return {count:5,type:'big'};
  if(roll<tNorm) return {count:1,type:'normal'};
  return null;
}

// ---------- 계단 방향 생성기 (리듬 프레이즈 그래머) ----------
// 거리 기반 인텐시티 곡선: 패턴 밀도와 게이지 램프가 공유하는 단일 노브. 후반 평탄화로 기록 도전 구간 유지.
function stairIntensity(d){
  if(d<40)  return 0.05;
  if(d<120) return 0.05+(d-40)/80*0.30;
  if(d<260) return 0.35+(d-120)/140*0.25;
  if(d<700) return 0.60+(d-260)/440*0.30;
  return 0.90;
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
// 명명된 프레이즈(CRUISE 직진 / ZIGZAG 트레몰로 / STUTTER 당김 / CADENCE 마무리 / GRACE 안전구간)를
// 인텐시티로 골라 이어붙여 턴비트 스트림을 만든다. gen()은 호출당 0/1 한 비트(기존 계약 그대로).
// 공정성: ①연속 단일턴 4개 하드캡 ②120층 미만 연속턴 금지 ③BUSY 2바 연속 후 강제 CRUISE ④로켓/존 재진입 GRACE.
function makeStairGen(opts){
  opts=opts||{};
  const seed=(opts.seed!=null)?(opts.seed>>>0):((Math.random()*4294967296)>>>0);
  const rng=mulberry32(seed);
  let dist=0, queue=[], lastWasTurn=false, grace=0, busyStreak=0, runLenSoFar=0, consecSingleOut=0;
  const ri=(a,b)=>a+Math.floor(rng()*(b-a+1));
  const pushStraight=n=>{ for(let k=0;k<n-1;k++) queue.push(0); queue.push(1); };   // 길이 n 직진 후 1번 꺾음
  function pickPhrase(d){
    const i=stairIntensity(d);
    if(grace>0){ const n=Math.min(grace,6); for(let k=0;k<n;k++) queue.push(0); grace-=n; return; }   // GRACE: 강제 직진 활주로
    const pBusy=(busyStreak>=2)?0:(0.18+0.55*i);                                    // BUSY 2연속이면 강제 CRUISE
    if(rng()>=pBusy){                                                              // CRUISE: 쉬는 박자, 게이지 회복
      const lo=Math.max(3,Math.round(7-4*i)), hi=Math.max(lo+1,Math.round(9-4*i));
      pushStraight(ri(lo,hi)); busyStreak=0;
    } else {                                                                       // BUSY: 긴장 구간
      busyStreak++;
      const kMax=Math.min(4,1+Math.round(3*i));
      if(rng()<0.5){ const k=ri(1,kMax); for(let j=0;j<k;j++) queue.push(1); }      // ZIGZAG 트레몰로
      else { pushStraight(2); pushStraight(ri(2,3)); }                              // STUTTER 당김
      if(i>0.45 && rng()<0.25){ pushStraight(2); queue.push(1); }                   // CADENCE 마무리(후반 한정)
    }
  }
  function gen(){
    let guard=0; while(queue.length===0 && guard++<8) pickPhrase(dist);
    if(queue.length===0) queue.push(0);
    let b=queue[0];
    if(b===1 && runLenSoFar===0 && consecSingleOut>=4){ runLenSoFar++; dist++; lastWasTurn=false; consecSingleOut=0; return 0; }  // 하드캡: 단일턴 5연속 차단
    if(b===1 && lastWasTurn && dist<120) b=0;                                       // 초반 연속턴 금지
    queue.shift(); runLenSoFar++; dist++;
    if(b===1){ if(runLenSoFar===1) consecSingleOut++; else consecSingleOut=0; runLenSoFar=0; lastWasTurn=true; }
    else lastWasTurn=false;
    return b;
  }
  gen.grant=n=>{ grace=Math.max(grace,n); queue.length=0; lastWasTurn=false; };   // 로켓/존 재진입 시 즉시 강제 직진 활주로(대기 턴 비움)
  gen.intensity=()=>stairIntensity(dist);
  gen.seed=seed;
  return gen;
}

// ---------- 렌더 설정 ----------
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,STEP_X=44,STEP_Y=24; const BLOCK_AR=0.5;   // 납작한 코지 계단 타일 비율

  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';   // 고해상 코지 아트 부드럽게
  const bw=Math.max(34,Math.round(W*0.165)); STEP_X=bw; STEP_Y=Math.round(bw*BLOCK_AR);  // 상한 제거(컬럼 비율 일정)
}

// ---------- 에셋 로드 ----------
const IMG={}; let toLoad=0,loaded=0,ready=false;

  im.onload=()=>{if(++loaded>=toLoad)ready=true;}; im.onerror=()=>{if(++loaded>=toLoad)ready=true;}; im.src=src; IMG[key]=im; }
// ---------- 캐릭터 선택 ----------
const CHARS=[{id:'cat',label:'체리',tag:'낮잠 챔피언'},{id:'latte',label:'라떼',tag:'새끼냥 지킴이'},{id:'nila',label:'닐라',tag:'계단의 여왕'}];
const CHAR_FR=['1','2','3','4','5','6','idle_1','idle_2','idle_3','idle_4',
               'drop_1','drop_2','drop_3','drop_4','drop_hp'];
const GENERATED_ACTION_GROUPS=[
  {name:'walk',frames:['1','2','3','4','5','6'],ratio:[0.78,1.28],area:[0.68,1.42],foot:7,center:12,adjacentScale:1.34,hardAdjacentScale:1.55,adjacentCenter:14},
  {name:'idle',frames:['idle_1','idle_2','idle_3','idle_4'],ratio:[0.84,1.2],area:[0.74,1.3],foot:5,center:8,adjacentScale:1.22,hardAdjacentScale:1.45,adjacentCenter:10},
  {name:'drop',frames:['drop_1','drop_2','drop_3','drop_4','drop_hp'],ratio:[0.55,1.8],area:[0.42,2.2],foot:24,center:28,adjacentScale:1.85,hardAdjacentScale:2.1,adjacentCenter:32}
];
// 정합 캔버스 — 모든 프레임이 발=FOOT_Y, 중심=CX로 정합되어 튐 없음
const CHAR_CW=480, CHAR_CH=342, CHAR_CX=240, CHAR_FOOT_Y=330, CHAR_D=300, CHAR_FOOT_SINK=0.06;
// 캐릭터별 15프레임 정규화 로드
const CHAR_ASSET={cat:'cherry',latte:'latte',nila:'nila'};

CHARS.forEach(c=>load('c_'+c.id+'_ride','assets/char/'+CHAR_ASSET[c.id]+'_ride.png'));   // 로켓 탑승(신난 표정)
const DEFAULT_CHAR='latte', DEFAULT_CHAR_VERSION='latte_p0_default';
const PARAMS=new URLSearchParams(location.search);
if(localStorage.getItem('is_char_default_version')!==DEFAULT_CHAR_VERSION){

let selectedChar = (CHARS.some(c=>c.id===bootChar)?bootChar:'') || localStorage.getItem('is_char') || DEFAULT_CHAR;
if(!CHARS.some(c=>c.id===selectedChar)) selectedChar=DEFAULT_CHAR;
const CAN_PICKUP_CHARS=new Set(['cat','latte','nila']);

const SOFT_CHAR_SCALE={cat:0.8,latte:0.8,nila:0.8};

const STORE_GEN_SPRITE='is_generated_cat_sprite', STORE_GEN_FRAMES='is_generated_cat_frames_v1', STORE_GEN_MAX=4200000, DIRECT_GENERATION_MAX=6*1024*1024, MAX_INVITE_PHOTOS=6;
const DEFAULT_GEN_LAYOUT={columns:5,rows:3,used_cells:15};
let pendingGenerationPhoto='', pendingGenerationPhotos=[], generatedCharFrames={}, generatedCharSrc='', generatedCharThumbSrc='', generatedCharVersion=0;
let p0Draft=null;

  if(!useCanPickup()) return 'coin_';

function clearGeneratedCharacter(){

function hasGeneratedCharacter(){ return false; }
function loadImageSrc(src){
  return new Promise((resolve,reject)=>{ const im=new Image(); im.onload=()=>resolve(im); im.onerror=reject; im.src=src; });
}
async function setGeneratedFrames(frameSources,persist=true){
  generatedCharFrames={}; generatedCharSrc=''; generatedCharThumbSrc='';
  if(!frameSources){
    if(persist) localStorage.removeItem(STORE_GEN_SPRITE);
    if(persist) localStorage.removeItem(STORE_GEN_FRAMES);
    generatedCharVersion++;
    updateGeneratedPreview();
    return;
  }
  try{
    const frames={};
    for(const suffix of CHAR_FR){
      const src=frameSources[suffix] || frameSources.idle_1 || frameSources['1'];
      if(!src) continue;
      const image=await loadImageSrc(src);
      frames[suffix]={src,image};
    }
    if(!frames.idle_1 && !frames['1']) throw new Error('no generated frames');
    generatedCharFrames=frames;
    generatedCharSrc=(frames.idle_1||frames['1']).src;
    generatedCharThumbSrc=makeGeneratedThumb((frames.idle_1||frames['1']).image) || generatedCharSrc;
    generatedCharVersion++;
    if(persist){
      const payload=JSON.stringify(Object.fromEntries(Object.entries(frames).map(([k,v])=>[k,v.src])));
      if(payload.length<STORE_GEN_MAX) localStorage.setItem(STORE_GEN_FRAMES,payload);
      localStorage.removeItem(STORE_GEN_SPRITE);
    }
    updateGeneratedPreview();
  }catch(e){
    generatedCharFrames={}; generatedCharSrc=''; generatedCharThumbSrc='';
    if(persist) localStorage.removeItem(STORE_GEN_SPRITE);
    if(persist) localStorage.removeItem(STORE_GEN_FRAMES);
    if(persist) setGenStatus('캐릭터 이미지를 불러오지 못했습니다.');
    else setGenStatus('사진 없이 시작하면 선택한 기본 캐릭터로 진행됩니다.');
    updateGeneratedPreview();
  }
}
async function setGeneratedCharacter(src,persist=true){
  if(!src){ await setGeneratedFrames(null,persist); return; }
  const source=await loadImageSrc(src);
  const normalized=normalizeGeneratedSprite(source) || src;
  const frames={}; CHAR_FR.forEach(suffix=>{ frames[suffix]=normalized; });
  await setGeneratedFrames(frames,persist);
}
function loadStoredGeneratedFrames(){
  try{
    const parsed=JSON.parse(localStorage.getItem(STORE_GEN_FRAMES)||'{}');
    return parsed && typeof parsed==='object' && Object.keys(parsed).length ? parsed : null;
  }catch(e){ return null; }
}
function trimOpaque(im){
  try{ const cv=document.createElement('canvas'); cv.width=im.width; cv.height=im.height; const g=cv.getContext('2d',{willReadFrequently:true}); g.drawImage(im,0,0);
    dropFlatBackground(g,im.width,im.height);
    const d=g.getImageData(0,0,im.width,im.height).data; let minX=im.width,minY=im.height,maxX=-1,maxY=-1;
    for(let y=0;y<im.height;y++)for(let x=0;x<im.width;x++){ if(d[(y*im.width+x)*4+3]>96){ if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y; } }
    return maxX<0?null:{source:cv,x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1};
  }catch(e){ return null; }
}
function dropFlatBackground(g,w,h){
  try{
    const img=g.getImageData(0,0,w,h), d=img.data, samples=[[0,0],[w-1,0],[0,h-1],[w-1,h-1]].map(([x,y])=>{
      const i=(y*w+x)*4; return [d[i],d[i+1],d[i+2],d[i+3]];
    }).filter(p=>p[3]>220);
    if(samples.length<3) return;
    const bg=samples.reduce((a,p)=>[a[0]+p[0],a[1]+p[1],a[2]+p[2],a[3]+p[3]],[0,0,0,0]).map(v=>v/samples.length);
    const magentaKey=bg[0]>210&&bg[1]<80&&bg[2]>210;
    for(let i=0;i<d.length;i+=4){
      const dist=Math.abs(d[i]-bg[0])+Math.abs(d[i+1]-bg[1])+Math.abs(d[i+2]-bg[2]);
      const magentaFringe=magentaKey&&d[i]>120&&d[i+2]>120&&d[i+1]<130&&Math.abs(d[i]-d[i+2])<95;
      if(d[i+3]>180 && (dist<(magentaKey?132:54)||magentaFringe)) d[i+3]=0;
    }
    g.putImageData(img,0,0);
  }catch(e){}
}
function hardenGeneratedSprite(g){
  try{ const img=g.getImageData(0,0,CHAR_CW,CHAR_CH), d=img.data;
    for(let i=0;i<d.length;i+=4){ if(d[i+3]<118) d[i+3]=0; else if(d[i+3]>224) d[i+3]=255; }
    g.putImageData(img,0,0);
  }catch(e){}
}
function normalizeGeneratedSprite(im){
  const tr=trimOpaque(im); if(!tr) return '';
  const cv=document.createElement('canvas'); cv.width=CHAR_CW; cv.height=CHAR_CH;
  const g=cv.getContext('2d',{willReadFrequently:true}); g.clearRect(0,0,cv.width,cv.height); g.imageSmoothingEnabled=false;
  const maxW=74, maxH=58, scale=Math.min(maxW/tr.w,maxH/tr.h);
  const dw=Math.max(1,Math.round(tr.w*scale)), dh=Math.max(1,Math.round(tr.h*scale));
  const dx=Math.round(CHAR_OX-dw/2), dy=Math.round(110-dh);
  g.drawImage(tr.source||im,tr.x,tr.y,tr.w,tr.h,dx,dy,dw,dh);
  hardenGeneratedSprite(g);
  return cv.toDataURL('image/png');
}
function resolveGeneratedLayout(layout){

  const rows=Number(layout&&layout.rows)||DEFAULT_GEN_LAYOUT.rows;
  const used=Number(layout&&layout.used_cells)||CHAR_FR.length;
  return columns>0&&rows>0&&columns*rows>=CHAR_FR.length
    ? {columns,rows,used_cells:Math.min(used,CHAR_FR.length)}
    : DEFAULT_GEN_LAYOUT;
}

function findOpaqueComponents(g,w,h,minAlpha=48){
  const img=g.getImageData(0,0,w,h), d=img.data, seen=new Uint8Array(w*h), comps=[], qx=[], qy=[];
  function opaque(x,y){ return d[(y*w+x)*4+3]>minAlpha; }
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const start=y*w+x; if(seen[start]||!opaque(x,y)) continue;
    let qi=0, area=0, minX=x, minY=y, maxX=x, maxY=y; qx.length=0; qy.length=0; qx.push(x); qy.push(y); seen[start]=1;
    while(qi<qx.length){
      const cx=qx[qi], cy=qy[qi++]; area++;
      if(cx<minX)minX=cx; if(cy<minY)minY=cy; if(cx>maxX)maxX=cx; if(cy>maxY)maxY=cy;
      [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]].forEach(([nx,ny])=>{
        if(nx<0||ny<0||nx>=w||ny>=h) return;
        const ni=ny*w+nx; if(seen[ni]||!opaque(nx,ny)) return;
        seen[ni]=1; qx.push(nx); qy.push(ny);

    }
    comps.push({area,x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1,maxX,maxY,cx:(minX+maxX)/2,cy:(minY+maxY)/2});
  }

}
function groupPoseRows(poses, sheetH){
  const rows=[], rowTol=Math.max(80, sheetH*0.16);
  poses.slice().sort((a,b)=>a.cy-b.cy).forEach(p=>{
    let row=rows.find(r=>Math.abs(r.cy-p.cy)<rowTol);
    if(!row){ row={cy:p.cy,items:[]}; rows.push(row); }
    row.items.push(p); row.cy=row.items.reduce((sum,item)=>sum+item.cy,0)/row.items.length;
  });
  rows.sort((a,b)=>a.cy-b.cy);
  rows.forEach(r=>r.items.sort((a,b)=>a.cx-b.cx));
  return rows;
}
function selectPoseBoxes(rows){
  if(rows.length>=3 && rows[0].items.length>=6 && rows[1].items.length>=4 && rows[2].items.length>=5){
    return rows[0].items.slice(0,6).concat(rows[1].items.slice(0,4), rows[2].items.slice(0,5));
  }
  if(rows.length>=3 && rows[0].items.length>=5 && rows[1].items.length>=5 && rows[2].items.length>=5){
    return rows[0].items.slice(0,5).concat(rows[1].items.slice(0,5), rows[2].items.slice(0,5));
  }
  return rows.flatMap(r=>r.items).slice(0,CHAR_FR.length);
}
function expandPoseBoxesWithEffects(boxes, components, sheetW, sheetH){
  const pad=Math.round(Math.min(sheetW,sheetH)*0.075);
  const selected=new Set(boxes);
  components.forEach(c=>{
    if(selected.has(c)||c.area<18) return;
    if(c.area>2200&&c.w>70&&c.h>70) return;
    let best=null, bestDist=Infinity;
    boxes.forEach((b,idx)=>{
      const inside=c.cx>=b.x-pad&&c.cx<=b.maxX+pad&&c.cy>=b.y-pad&&c.cy<=b.maxY+pad;
      if(!inside) return;
      const dx=c.cx-b.cx, dy=c.cy-b.cy, dist=dx*dx+dy*dy;
      if(dist<bestDist){ bestDist=dist; best=idx; }
    });
    if(best==null) return;
    const b=boxes[best];
    b.x=Math.max(0,Math.min(b.x,c.x)); b.y=Math.max(0,Math.min(b.y,c.y));
    b.maxX=Math.min(sheetW-1,Math.max(b.maxX,c.maxX)); b.maxY=Math.min(sheetH-1,Math.max(b.maxY,c.maxY));
    b.w=b.maxX-b.x+1; b.h=b.maxY-b.y+1; b.cx=(b.x+b.maxX)/2; b.cy=(b.y+b.maxY)/2;
  });
  return boxes;
}
async function autoExtractGeneratedSpriteSheet(sheetSrc){
  window.__lastExtractionIssues=[];
  window.__lastExtractionWarnings=[];
  const sheet=await loadImageSrc(sheetSrc);
  const cv=document.createElement('canvas'), g=cv.getContext('2d',{willReadFrequently:true});
  cv.width=sheet.width; cv.height=sheet.height; g.drawImage(sheet,0,0); dropFlatBackground(g,cv.width,cv.height);
  const components=findOpaqueComponents(g,cv.width,cv.height);
  const minPoseArea=Math.max(2600,cv.width*cv.height*0.006);
  const poses=components.filter(c=>c.area>=minPoseArea && c.w>70 && c.h>70)
    .sort((a,b)=>b.area-a.area)
    .slice(0,24);
  const rows=groupPoseRows(poses,cv.height);
  let boxes=selectPoseBoxes(rows).map(b=>({...b}));
  if(boxes.length<CHAR_FR.length) throw new Error('not enough generated poses');
  boxes=expandPoseBoxesWithEffects(boxes.slice(0,CHAR_FR.length),components,cv.width,cv.height);
  const frames={};
  for(let i=0;i<CHAR_FR.length;i++){
    const b=boxes[i], pad=Math.round(Math.min(b.w,b.h)*0.04);
    if(b.x<=1||b.y<=1||b.maxX>=cv.width-2||b.maxY>=cv.height-2){
      window.__lastExtractionIssues.push(CHAR_FR[i]+':source_cropped_edge');
    }
    const sx=Math.max(0,b.x-pad), sy=Math.max(0,b.y-pad);
    const sw=Math.min(cv.width-sx,b.w+pad*2), sh=Math.min(cv.height-sy,b.h+pad*2);
    const cell=document.createElement('canvas'), cg=cell.getContext('2d',{willReadFrequently:true});
    cell.width=sw; cell.height=sh; cg.clearRect(0,0,sw,sh); cg.drawImage(cv,sx,sy,sw,sh,0,0,sw,sh);
    const normalized=normalizeGeneratedSprite(cell);
    if(normalized) frames[CHAR_FR[i]]=normalized;
  }
  return frames;
}
async function inspectGeneratedFrame(src){
  const im=await loadImageSrc(src);
  const cv=document.createElement('canvas'), g=cv.getContext('2d',{willReadFrequently:true});
  cv.width=im.width; cv.height=im.height; g.drawImage(im,0,0);
  const img=g.getImageData(0,0,cv.width,cv.height), d=img.data, w=cv.width, h=cv.height;
  let minX=w,minY=h,maxX=-1,maxY=-1,count=0;
  const seen=new Uint8Array(w*h), components=[];
  const qx=[], qy=[];
  function opaque(x,y){ return d[(y*w+x)*4+3]>32; }
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    if(!opaque(x,y)) continue;
    count++; if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y;
    const start=y*w+x; if(seen[start]) continue;
    let qi=0, area=0, cminX=x,cminY=y,cmaxX=x,cmaxY=y; qx.length=0; qy.length=0; qx.push(x); qy.push(y); seen[start]=1;
    while(qi<qx.length){
      const cx=qx[qi], cy=qy[qi++]; area++;
      if(cx<cminX)cminX=cx; if(cy<cminY)cminY=cy; if(cx>cmaxX)cmaxX=cx; if(cy>cmaxY)cmaxY=cy;
      [[cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]].forEach(([nx,ny])=>{
        if(nx<0||ny<0||nx>=w||ny>=h) return;
        const ni=ny*w+nx; if(seen[ni]||!opaque(nx,ny)) return;
        seen[ni]=1; qx.push(nx); qy.push(ny);
      });
    }
    components.push({area,x:cminX,y:cminY,w:cmaxX-cminX+1,h:cmaxY-cminY+1,maxY:cmaxY});
  }
  components.sort((a,b)=>b.area-a.area);
  const largest=components[0]||null;
  const detachedLower=largest ? components.slice(1).some(c=>c.area>42 && c.y>largest.y+largest.h*0.62 && c.maxY>=largest.maxY-2) : false;
  return {bbox:maxX<0?null:{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1,foot:maxY,count}, components:components.slice(0,6), detachedLower};
}
function medianNumber(values){
  const sorted=values.filter(Number.isFinite).slice().sort((a,b)=>a-b);
  if(!sorted.length) return 0;
  const mid=Math.floor(sorted.length/2);
  return sorted.length%2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
}
function fmtMetric(value){ return Number(value).toFixed(2).replace(/\.?0+$/,''); }
function addRatioIssue(list, prefix, value, base, min, max){
  if(!base) return;
  const ratio=value/base;
  if(ratio<min||ratio>max) list.push(prefix+'_'+fmtMetric(ratio));
}
function addActionConsistencyIssues(metrics, issues, warnings){
  GENERATED_ACTION_GROUPS.forEach(group=>{
    const items=group.frames.map(name=>{
      const b=metrics[name]&&metrics[name].bbox;
      return b ? {name,b,cx:b.x+b.w/2,cy:b.y+b.h/2} : null;
    }).filter(Boolean);
    if(items.length<2) return;
    const med={
      w:medianNumber(items.map(item=>item.b.w)),
      h:medianNumber(items.map(item=>item.b.h)),
      count:medianNumber(items.map(item=>item.b.count)),
      foot:medianNumber(items.map(item=>item.b.foot)),
      cx:medianNumber(items.map(item=>item.cx))
    };
    items.forEach(item=>{
      addRatioIssue(issues, group.name+':'+item.name+':width_ratio', item.b.w, med.w, group.ratio[0], group.ratio[1]);
      addRatioIssue(issues, group.name+':'+item.name+':height_ratio', item.b.h, med.h, group.ratio[0], group.ratio[1]);
      addRatioIssue(issues, group.name+':'+item.name+':area_ratio', item.b.count, med.count, group.area[0], group.area[1]);
      const footDrift=Math.abs(item.b.foot-med.foot);
      const centerDrift=Math.abs(item.cx-med.cx);
      if(footDrift>group.foot) issues.push(group.name+':'+item.name+':foot_drift_'+fmtMetric(footDrift));
      if(centerDrift>group.center) issues.push(group.name+':'+item.name+':center_drift_'+fmtMetric(centerDrift));
    });
    for(let i=1;i<items.length;i++){
      const prev=items[i-1], cur=items[i];
      const scaleJump=Math.max(
        cur.b.w/Math.max(prev.b.w,1), prev.b.w/Math.max(cur.b.w,1),
        cur.b.h/Math.max(prev.b.h,1), prev.b.h/Math.max(cur.b.h,1)
      );
      const centerJump=Math.abs(cur.cx-prev.cx);
      if(scaleJump>group.hardAdjacentScale) issues.push(group.name+':'+prev.name+'_to_'+cur.name+':scale_jump_'+fmtMetric(scaleJump));
      else if(scaleJump>group.adjacentScale) warnings.push(group.name+':'+prev.name+'_to_'+cur.name+':scale_jump_'+fmtMetric(scaleJump));
      if(centerJump>group.adjacentCenter) warnings.push(group.name+':'+prev.name+'_to_'+cur.name+':center_jump_'+fmtMetric(centerJump));
    }
  });
}
function repairGeneratedFrames(frameSources){
  window.__lastRepairWarnings=[];
  const repaired={...(frameSources||{})};
  const any=CHAR_FR.find(name=>repaired[name]);
  if(!any) return null;
  function replacementFor(groupFrames,index){
    for(let i=index-1;i>=0;i--) if(repaired[groupFrames[i]]) return repaired[groupFrames[i]];
    for(let i=index+1;i<groupFrames.length;i++) if(repaired[groupFrames[i]]) return repaired[groupFrames[i]];
    return repaired[any];
  }
  GENERATED_ACTION_GROUPS.forEach(group=>{
    group.frames.forEach((name,index)=>{
      if(repaired[name]) return;
      repaired[name]=replacementFor(group.frames,index);
      window.__lastRepairWarnings.push(name+':filled_from_generated_neighbor');
    });
  });
  CHAR_FR.forEach(name=>{
    if(repaired[name]) return;
    repaired[name]=repaired[any];
    window.__lastRepairWarnings.push(name+':filled_from_generated_fallback');
  });
  return repaired;
}
async function makeSingleGeneratedFallbackFrames(sheetSrc){
  window.__lastExtractionMode='single_sheet_fallback';
  const sheet=await loadImageSrc(sheetSrc);
  const normalized=normalizeGeneratedSprite(sheet);
  if(!normalized) return null;
  window.__lastRepairWarnings=['all:single_generated_sheet_fallback'];
  const frames={};
  CHAR_FR.forEach(name=>{ frames[name]=normalized; });
  return frames;
}
async function validateGeneratedFrames(frameSources){
  const issues=(window.__lastExtractionIssues||[]).slice(), warnings=(window.__lastExtractionWarnings||[]).concat(window.__lastRepairWarnings||[]), metrics={};
  for(const suffix of CHAR_FR){
    const src=frameSources[suffix];
    if(!src){ issues.push(suffix+':missing'); continue; }
    const m=await inspectGeneratedFrame(src); metrics[suffix]=m;
    const b=m.bbox;
    if(!b){ issues.push(suffix+':empty'); continue; }
    const maxX=b.x+b.w-1;
    if(b.x<=1||b.y<=1||maxX>=CHAR_CW-2||b.foot>=CHAR_CH-1) issues.push(suffix+':cropped_edge');
    if(b.w<28||b.w>94||b.h<22||b.h>72) issues.push(suffix+':bad_bounds_'+b.w+'x'+b.h);
    else if(b.w<34||b.h<24||b.h>66) warnings.push(suffix+':borderline_bounds_'+b.w+'x'+b.h);
    if(b.foot<92||b.foot>113) warnings.push(suffix+':foot_'+b.foot);
    if(b.count<650) issues.push(suffix+':too_sparse_'+b.count);
    if(m.detachedLower) warnings.push(suffix+':detached_lower_component');
  }
  addActionConsistencyIssues(metrics, issues, warnings);
  return {ok:issues.length===0,issues,warnings,metrics};
}

let stairs, gen, player, gauge, guageSpeed, addSpeed, maxCount, nowStairsCount, isCheckAddSpeed;

let combo=0, comboPopT=0;   // 깔끔하게 연속으로 맞히면 콤보 → 회복량↑ + 연출(숙련 보상)
// === 구름잠(Cloud Nap) v2: 스와이프로 2발판 중 선택 + 졸음(체력) + 기분 ===
let offers=[], wake=0.72, moodLeft=3, cleanStreak=0, slidePending=false, stumbleT=0, dragLane=-1;
const WAKE_START=0.72, WAKE_CLEAN=0.055, WAKE_REWARD=0.14, WAKE_COMBO=0.03;

function clamp01(v){ return v<0?0:(v>1?1:v); }
function setClip(n){ if(clipName!==n){ clipName=n; clipT=0; } }

function ensureStairs(upto){
  while(stairs.length<=upto){
    const prev=stairs[stairs.length-1];
    const dir = prev.turn ? -prev.dir : prev.dir;          // 직전이 turn이면 방향 반전
    const i=stairs.length;
    // 발판 위 데코 프롭 제거 — 아기자기한 동적 요소는 모두 배경(앰비언트)으로 이동
    const turn=gen();
    const s={ gx:prev.gx+dir, gy:prev.gy+1, turn, dir,
              coin: (turn===0 && i>=COIN_MIN_STAIR) ? coinRoll(i) : null, prop:null, rocket:false };   // 픽업은 직진 칸에만(꺾는 칸에 묻혀 죽는 일 방지)
    // 로켓: 드물게, 직진·코인 없는 칸에, 충분히 띄워서 배치
    if(turn===0 && i>=ROCKET_MIN_STAIR && !s.coin && (i-lastRocketStair)>=ROCKET_GAP && Math.random()<ROCKET_RATE){ s.rocket=true; lastRocketStair=i; }
    stairs.push(s);
  }
}

// === 구름잠 코어: 매 비트 2개 발판 제안 → 스와이프로 선택 ===
function genOffers(cur){           // cur 위 한 줄에 좌/우 2개 발판(solid/reward/cloud)
  const ay=cur.gy+2.5, inten=stairIntensity(score), pCloud=0.10+0.24*inten, pReward=0.27;   // 머리 위로 또렷이 + 좌우 간격 넓게
  const mk=(gx)=>{ const r=Math.random(); let type='solid', reward=null;
    if(r<pCloud) type='cloud';
    else if(r<pCloud+pReward){ type='reward'; reward=(Math.random()<0.25)?{type:'big',count:5}:{type:'normal',count:1}; }
    return {gx, gy:ay, type, reward}; };
  const a=mk(cur.gx-1.45), b=mk(cur.gx+1.45);
  if(a.type==='cloud'&&b.type==='cloud'){ (Math.random()<0.5?a:b).type='solid'; }   // 코지 페어니스: 최소 1개 안전
  return [a,b];
}
function chooseLane(lane){
  if(state!=='play'||paused||stumbleT>0) return;
  hideHand(); started=true;
  let li=lane;
  if(slidePending){ slidePending=false; if(combo<STEADY_COMBO && Math.random()<CLOUD_SLIDE_P){ li=1-lane; spawnFx('puff', offers[li].gx, offers[li].gy); } }  // 구름 미끄러짐
  const L=offers[li]||offers[0], cur=stairs[player.idx];
  const s={ gx:L.gx, gy:L.gy, type:L.type, coin:(L.type==='reward'?L.reward:null), rocket:false };
  stairs.push(s); player.idx++; player.facing=(L.gx<cur.gx)?-1:1;
  setClip('walk'); lastStepAt=performance.now(); stepHopT=0;
  spawnFx('puff', s.gx, s.gy);
  combo++; if(combo>=5 && combo%5===0) comboPopT=0.5;
  if(L.type==='reward' && s.coin){ s.coin.got=true; coins+=s.coin.count; playSfx(s.coin.type==='big'?SFX.bigcoin:SFX.coin);
    spawnFx(pickupGetFx(s.coin), s.gx, s.gy); document.getElementById('coinCnt').textContent=bestCoins+coins;
    wake=clamp01(wake+WAKE_REWARD); cleanStreak++; }
  else if(L.type==='cloud'){ slidePending=true; cleanStreak=0; playSfx(SFX.turn); }   // 구름: 회복 0 + 다음 비트 미끄러질 수도
  else { wake=clamp01(wake+WAKE_CLEAN); cleanStreak++; playSfx(SFX.turn); }
  if(combo>0 && combo%4===0) wake=clamp01(wake+WAKE_COMBO);                            // 콤보 보너스
  if(cleanStreak>0 && cleanStreak%CLEAN_REGEN===0 && moodLeft<MOOD_MAX){ moodLeft++; spawnFx('cget', s.gx, s.gy); }  // 깔끔 연속 → 기분 회복
  score++; document.getElementById('score').textContent=score;
  bgScroll += 1/15;                                          // 한 칸마다 또렷이 상승(바이옴 색이 차근차근 바뀜)
  if(score>bestAtStart && !kickFired && bestAtStart>0){ kickFired=true; spawnFx('kick', s.gx, s.gy); showRecord(); }
  offers=genOffers(s);
  if(player.idx>90){ stairs.splice(0,50); player.idx-=50; }                            // 지나온 길 정리(메모리)
}
function loseMood(){                // 졸음 0(탈진) 또는 장애물 → 기분 1칸↓. 0이면 잠들며 종료(즉사 아님)
  moodLeft--; combo=0; comboPopT=0; cleanStreak=0;
  if(moodLeft<=0){ die(); return; }                          // 기분 0 → 기존 북엔드(집으로 돌아와 잠) 재사용
  wake=Math.max(wake,0.32); stumbleT=0.5; setClip('drop'); clipT=0; playSfx(SFX.drop);  // 제자리 비틀(추락 아님)
}
function drawHud(){                 // 캔버스 HUD: 좌상단 달 게이지(졸음) + 기분 발바닥 핍 + 우측 고도
  const pad=Math.round(W*0.035), r=Math.round(W*0.045), cx=pad+r, cy=Math.round(48+r);
  // 달 게이지 — 채워질수록 둥근 보름달(밝음=깨어있음), 줄면 초승달
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,6.283); ctx.fillStyle='rgba(40,42,70,.45)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,6.283); ctx.clip();
  ctx.fillStyle='#ffe9a8'; const fy=cy+r-2*r*clamp01(wake); ctx.fillRect(cx-r,fy,2*r,2*r);   // 아래→위로 차오름
  ctx.restore();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,r,0,6.283); ctx.lineWidth=3; ctx.strokeStyle='#5a3a1a'; ctx.stroke(); ctx.restore();
  // 기분 발바닥 핍 3개
  const paw=IMG['paw']||IMG['ui_paw']; const ps=Math.round(r*0.85);
  for(let i=0;i<MOOD_MAX;i++){ const px=cx+r+8+i*(ps+4), py=cy;
    ctx.save(); ctx.globalAlpha=i<moodLeft?1:0.25; ctx.translate(px,py);
    if(paw&&paw.width) ctx.drawImage(paw,-ps/2,-ps/2,ps,ps);
    else { ctx.beginPath(); ctx.arc(0,0,ps*0.4,0,6.283); ctx.fillStyle=i<moodLeft?'#ff9ab0':'#888'; ctx.fill(); }
    ctx.restore(); }
  // 고도(점수) — 우측에 은은히
  ctx.save(); ctx.font='800 '+Math.round(W*0.052)+'px -apple-system,sans-serif'; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillStyle='rgba(255,247,234,.82)'; ctx.strokeStyle='rgba(90,58,26,.5)'; ctx.lineWidth=3;
  ctx.strokeText(score,W-pad,42); ctx.fillText(score,W-pad,42); ctx.restore();
}

function checkIncreaseSpeed(scorePre){                     // 게이지 속도를 패턴과 '같은' 인텐시티 곡선에 연속 결합
  // 계단 단(stepped) 램프(층100 급발진) 제거 → 부드럽게. 패턴이 초중반 난이도를 맡고 속도는 후반에 차오름.
  guageSpeed = GUAGE_SPEED0 + (MAX_ADD_SPEED-GUAGE_SPEED0)*Math.min(1, stairIntensity(scorePre)/0.9);
}

// ---------- 입력 ----------
function act(isTurnPress){
  if(state!=='play'||paused) return;
  hideHand();                                                 // 첫 입력 → 튜토리얼 손가락 숨김
  const cur=stairs[player.idx];
  const needTurn = cur.turn===1;
  if(isTurnPress!==needTurn){ die(); return; }              // 틀린 버튼 → 추락
  started=true;                                              // 첫 스텝부터 타이머(드레인) 시작
  if(isTurnPress) playSfx(SFX.turn);                         // 방향을 꺾는 스텝에서만 turn.ogg (직진은 무음)

  checkIncreaseSpeed(score);
  combo++; if(combo>=5 && combo%5===0) comboPopT=0.5;                       // 콤보 적립(5단위 팝 연출)
  const effRefill=GUAGE_REFILL+0.05*Math.min(combo/80,1);                   // 콤보가 쌓이면 회복량 0.13→0.18(상한). 평탄기 드레인보다 낮아 무적 불가.
  const gPrev=gauge; gauge=clamp01(gauge+effRefill);
  if(gPrev<0.12 && gauge>0.30) flashGauge();                               // 위기 탈출 니어미스 플래시
  score++; player.idx++;
  ensureStairs(player.idx+60);

  const landed=stairs[player.idx];
  const moved=landed.gx-cur.gx; player.facing=moved<0?-1:1;
  // 스텝 먼지 효과 (turn이면 turn puff)
  spawnFx(isTurnPress?'tpuff':'puff', landed.gx, landed.gy);
  setClip('walk'); lastStepAt=performance.now(); stepHopT=0;   // clipT 리셋 안 함 → 다리 사이클 연속, 홉만 스텝별

  // 코인 수집 (착지 계단의 코인)
  if(landed.coin && !landed.coin.got){
    landed.coin.got=true; coins+=landed.coin.count;
    playSfx(landed.coin.type==='big'?SFX.bigcoin:SFX.coin);
    spawnFx(pickupGetFx(landed.coin), landed.gx, landed.gy);
    const total=bestCoins+coins; document.getElementById('coinCnt').textContent=total;
  }
  // 층별 프롭 상호작용 — 착지 칸에 프롭이 있으면 반응 시작(화분 쓰러짐/친구 인사/풍선 둥실 등)
  if(landed.prop && !landed.prop.reacted){ landed.prop.reacted=true; landed.prop.reactT=0;
    spawnFx('cget',landed.gx,landed.gy); try{ playSfx(landed.prop.type==='friend'?SFX.button:SFX.coin); }catch(e){} }
  // 최고기록 통과 → 킥 스타버스트 1회
  if(!kickFired && bestAtStart>0 && score>bestAtStart){ kickFired=true; spawnFx('kick',landed.gx,landed.gy); showRecord(); }
  bgScroll += (score<6 ? 1/14 : 1/28);   // 코지 여정 상승 속도 2배 느림(한참 올라가야 집을 벗어남, ≈28스텝/밴드)
  document.getElementById('score').textContent=score;
  updateGauge(); flashGauge();
  if(landed.rocket && !landed.rocketUsed){ landed.rocketUsed=true; startRocket(); }   // 로켓 획득 → 부스트 상승
}
function startRocket(){                                       // 로켓 타고 위로 → 가까운 발판 착지 → 3·2·1 → 재개
  state='rocket'; rocketT=0;
  rocketToIdx=player.idx+ROCKET_BOOST; ensureStairs(rocketToIdx+60);
  rocketFromGy=stairs[player.idx].gy; rocketToGy=stairs[rocketToIdx].gy;
  rocketFromGx=stairs[player.idx].gx; rocketToGx=stairs[rocketToIdx].gx;   // 카메라 X도 보간 → 목적지 발판이 화면 중앙으로 정확히 도착
  rocketFromBg=bgScroll; rocketToBg=altAtStair(rocketToIdx);
  rocketCamGy=rocketFromGy; rocketCamGx=rocketFromGx;
  try{ playSfx(SFX.rocket); }catch(e){}   // 로켓 타고 올라갈 때 rocket.ogg
  if(navigator.vibrate) try{navigator.vibrate(20);}catch(e){}
}
function die(){
  combo=0; comboPopT=0;
  state='return'; returnT=0; fallT=0; bgScroll=0;   // 영혼이 스르륵 몸으로 돌아가는 부드러운 마무리
  setClip('drop'); clipT=0; camFreezeGy=stairs[player.idx].gy;

}
function gameOver(){
  state='over'; hideHand(); _pauseBtnEl.style.display='none'; setPaused(false);

              kind==='canget' ? {n:5,fps:10,key:'canget_'} :   // can_get 5f@10fps

function updateGauge(){ document.getElementById('gaugeFill').style.transform='scaleX('+clamp01(gauge)+')'; }
let fxT=0;
function flashGauge(){ fxT=0.22; const e=document.getElementById('gaugeFx');
  e.style.transform='scaleX('+clamp01(gauge)+')'; }   // 은은한 흰색 시머(주황 채움 위로 페이드)

// ---------- 루프 ----------
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05) dt=0.05; lastDt=dt;
  if(paused){ render(); requestAnimationFrame(frame); return; }   // 일시정지: 화면 고정, 갱신 중단
  coinAnimT+=dt; if(comboPopT>0) comboPopT-=dt;
  if(state==='play'){
    if(stumbleT>0){ stumbleT-=dt; if(stumbleT<=0){ setClip('idle'); clipT=0; } }   // 제자리 비틀 회복
    else if(started){                         // 졸음(체력) 자연 감소 — 느리게, 후반↑ (트위치 타이머 아님)
      wake -= (0.011 + 0.022*stairIntensity(score))*dt;
      if(wake<=0){ wake=0; loseMood(); }      // 탈진 → 기분 1칸↓(즉사 아님)
    }
  } else if(state==='sleep'){ sleepT+=dt; if(sleepT>0.9){ state='wake'; wakeT=0; } }   // 바닥에서 자다가
  else if(state==='wake'){ wakeT+=dt; if(wakeT>1.0){ state='play'; started=false; setClip('idle'); clipT=0; showIntro(); } }  // 떠올라 깨며 등반 시작
  else if(state==='return'){ returnT+=dt; bgScrollDisp+=(0-bgScrollDisp)*Math.min(1,dt*3.2); if(returnT>1.1){ state='homewake'; wakeT=0; bgScrollDisp=0; bgScroll=0; } }  // 꿈을 거슬러 스르륵 내려옴
  else if(state==='homewake'){ wakeT+=dt; if(wakeT>0.85){ gameOver(); } }   // 몸으로 들어가 다시 잠 → 결과
  else if(state==='rocket'){ rocketT+=dt;                                    // 로켓 상승: 발판·배경이 함께 시원하게 아래로 흐름
    const u=easeIO(Math.min(1,rocketT/ROCKET_DUR));
    rocketCamGy=rocketFromGy+(rocketToGy-rocketFromGy)*u;
    rocketCamGx=rocketFromGx+(rocketToGx-rocketFromGx)*u;
    bgScroll=bgScrollDisp=rocketFromBg+(rocketToBg-rocketFromBg)*u;          // 배경도 동기 상승
    if(rocketT>=ROCKET_DUR){                                                 // 가까운 발판에 착지
      player.idx=rocketToIdx; score+=ROCKET_BOOST; document.getElementById('score').textContent=score;
      stairs.length=player.idx+1; stairs[player.idx].turn=0; if(gen.grant)gen.grant(2); ensureStairs(player.idx+60);   // 착지 발판+다음칸 강제 직진 → 재개 첫 탭(올라가기)이 즉사하지 않게
      const nx=stairs[player.idx+1]; player.facing = (nx && nx.gx<stairs[player.idx].gx)?-1:1;
      if(!kickFired && bestAtStart>0 && score>bestAtStart){ kickFired=true; spawnFx('kick',stairs[player.idx].gx,stairs[player.idx].gy); showRecord(); }
      spawnFx('puff',stairs[player.idx].gx,stairs[player.idx].gy);
      state='countdown'; countT=3*COUNT_STEP; setClip('idle'); clipT=0;
    }
  }
  else if(state==='countdown'){ countT-=dt; if(countT<=0){ state='play'; started=true; gauge=GUAGE_MAX; updateGauge(); setClip('idle'); clipT=0; lastStepAt=performance.now(); } }  // 3·2·1 끝 → 게이지 가득 채우고 재개
  document.getElementById('gaugeWrap').style.opacity=(state==='play')?'1':'0';
  if(fxT>0){ fxT-=dt; document.getElementById('gaugeFx').style.opacity=Math.max(0,fxT/0.22*0.45); }  // 0.45→0 부드럽게
  bgScrollDisp += (bgScroll-bgScrollDisp)*Math.min(1,dt*6);   // 0.4s 이징 근사
  if(state==='play') checkZone();                              // 존 전환 연출
  updateAmbient(dt);                                           // 앰비언트 살아있는 배경 갱신
  // 효과 진행/만료
  for(let i=fx.length-1;i>=0;i--){ fx[i].t+=dt;
    if(fx[i].t*fx[i].def.fps>=fx[i].def.n) fx.splice(i,1); }
  // 애니 — walk는 연속 사이클(다리 매끄럽게), 탭이 멈추면 idle로
  stepHopT+=dt;
  if(state==='play'&&clipName==='walk'&&now-lastStepAt>340) setClip('idle');
  const cl=CLIPS[clipName]; clipT+=dt; let fi=Math.floor(clipT*cl.fps);
  if(!cl.loop&&fi>=cl.f.length) fi=cl.f.length-1; if(cl.loop) fi%=cl.f.length;
  window.__curFrame=cl.f[fi];
  // idle 시그니처 피젯 — 가만히 있으면 가끔 성격 포즈(체리 하품/라떼 어르기/닐라 왕관)
  if(state==='play' && clipName==='idle'){
    idleHoldT+=dt; const fig=IMG['c_'+selectedChar+'_fidget'];
    if(now<fidgetUntil){ if(fig&&fig.width) window.__curFrame='fidget'; }
    else if(idleHoldT>4.5 && fig&&fig.width){ fidgetUntil=now+1600; idleHoldT=0; window.__curFrame='fidget'; }
  } else idleHoldT=0;
  render();
  requestAnimationFrame(frame);
}

// ---------- 렌더 ----------
/* 배경 스크롤: MAP_CITY(0) — bgTypeList 37프레임 세로 무라(bg_a 지면→bg_g 하늘).
   인트로(0..36) 1회 후 endBg=33 → [33..36]=bg_d_1..4 반복. 4장 적층·세로 스크롤·재활용.
   스크롤 speed = (score<11? 0.61 : 0.15) world/스텝, 프레임 주기 SpriteSize.y=5.1 → frames/스텝. */
// 옵션A — 5개 액트 벽화를 하나의 연속 벽화로 이어붙여(_strip) 13프레임 슬라이스 → 픽셀 무이음
const BG_FRAMES=['j_1','j_2','j_3','j_4','j_5','j_6','j_7','j_8','j_9','j_10','j_11','j_12','j_13'];
const BG_LOOP_START=10;                               // 상단 꿈우주 3프레임 순환(루프 이음새만 살짝 디졸브)
const BG_PERIOD=5.1;
function bgFrameIdx(i){
  if(i<0) i=0;
  if(i<BG_FRAMES.length) return i;
  const L=BG_FRAMES.length-BG_LOOP_START;
  return BG_LOOP_START+(((i-BG_FRAMES.length)%L)+L)%L;
}
function bgFrame(i){ return 'bg_'+BG_FRAMES[bgFrameIdx(i)]; }
function bgBand(){ return Math.min(BG_FRAMES.length-1, Math.max(0, Math.floor(bgScrollDisp))); }  // 현재 고도 밴드
// 고도별 하늘 톤(머럴 이음새/로딩 안전 채움) — 따뜻함→차가움
const BG_TONE=['#fbe9d8','#f6e0cc','#ecd6c2','#d8d0c4','#cfe0ea','#c2dcec',
  '#cdd9e8','#e0d3cf','#e2bf9f','#cf9f88','#9c86b2','#574f88','#2b2750'];
function lerpHex(a,b,t){
  const pa=parseInt(a.slice(1),16), pb=parseInt(b.slice(1),16);
  const r=Math.round((pa>>16)+(((pb>>16)-(pa>>16))*t));
  const g=Math.round(((pa>>8)&255)+((((pb>>8)&255)-((pa>>8)&255))*t));
  const bl=Math.round((pa&255)+(((pb&255)-(pa&255))*t));
  return 'rgb('+r+','+g+','+bl+')';
}
function bgToneAt(s){
  const idx=bgFrameIdx(Math.floor(s)), idx2=bgFrameIdx(Math.floor(s)+1);
  return lerpHex(BG_TONE[idx], BG_TONE[idx2], s-Math.floor(s));
}
let bgScrollDisp=0;
function bgAct(i){ return BG_FRAMES[bgFrameIdx(i)].split('_')[0]; }   // 머럴(액트) 구분: home/roof/sky/dusk/dream

// ===== 앰비언트 살아있는 배경 레이어 (지브리풍 — 굴뚝연기/깃발펄럭/구름/새/꽃잎/반짝임) =====
let amb=[];
// 배경의 실제 구조물(굴뚝/지붕)에 합성되는 앵커 — 월드 고도 기준, 배경과 함께 스크롤
const AY_CHIMNEY=4.70, X_CHIMNEY=0.19;   // bg_j_5 좌측 굴뚝 구멍
const AY_FRIEND=4.08,  X_FRIEND=0.64;    // bg_j_5 지붕 타일 표면(친구냥이 떠보이지 않게 낮춤)
const AY_MUG=1.55,     X_MUG=0.44;       // bg_j_2 선반 머그컵(김 모락모락) — 실내 살아있는 요소
const AY_WINDOW=2.5;                      // 창문 하늘 틈 중앙(창밖으로 새가 난다) — 실측 보정
const AY_CUSHION=0.55, X_CUSHION=0.30;   // bg_j_1 고양이 방석(자는 자리)
function bgBH(){ return Math.ceil(W*102/160); }
function featSY(ay){ return H-(ay-bgScrollDisp)*bgBH(); }   // 월드 고도 → 현재 화면 y(배경과 동기 스크롤)
function curAmbZone(){ return Math.max(0, Math.min(4, Math.floor((bgScrollDisp+1.2)/2.6))); }  // 화면에 보이는 존
function ambImg(t){ if(t==='twinkle'||t==='shoot') return IMG['cget_1']; if(t==='balloon') return IMG['prop_balloon']; return IMG['amb_'+t]; }
function spawnAmb(type,o){ amb.push(Object.assign({type,t:0,ph:Math.random()*6.283},o)); }
function spawnBird(low){   // 깊이감 있는 새: far=저 멀리 작고 느리고 흐릿, near=가까이 크고 빠르게 휙
  const d=Math.random()<0.5?1:-1, far=low?false:Math.random()<0.55;
  spawnAmb('bird',{layer:'far', far:far, flip:d<0,
    x:d<0?W+70:-70,
    y:far?H*(0.05+Math.random()*0.22):H*(0.30+Math.random()*0.34),
    vx:d*(far?30+Math.random()*16:120+Math.random()*70),
    sz:far?0.08+Math.random()*0.03:0.26+Math.random()*0.12, life:1});
}
function spawnWindowBird(){   // 집 창문(bg_j_2) 하늘 틈으로 작은 새가 가로지른다(월드 고도 앵커)
  const d=Math.random()<0.5?1:-1;
  spawnAmb('bird',{layer:'far', far:true, flip:d<0, win:true,
    ay:AY_WINDOW+(Math.random()-0.5)*0.45, ax:d<0?0.72:0.28, vax:d*(0.055+Math.random()*0.04),
    sz:0.075+Math.random()*0.03, life:1});
}
function updateAmbient(dt){
  const z=curAmbZone(), n={};
  for(const p of amb){ p.t+=dt; n[p.type]=(n[p.type]||0)+1; }
  if(z===0){ // 집(실내): 창밖으로 새가 날고(창문에 합성) + 선반 머그컵 김(아래 emitter). 의미없는 반짝이 먼지는 제거
    if(Math.random()<dt*0.55) spawnWindowBird();
  }
  else if(z===1){ // 지붕(정원): 벚꽃잎 흩날림 — 여기서만(컨텍스트)
    if(Math.random()<dt*1.8) spawnAmb('petal',{layer:'near',x:Math.random()*W,y:-24,vy:36+Math.random()*22,sway:18+Math.random()*14,vr:(Math.random()-0.5)*2.6,sz:0.11+Math.random()*0.07,life:1});
    if(Math.random()<dt*0.35) spawnBird(true);   // 지붕 근처 새 가끔
  } else if(z===2||z===3){ // 하늘/노을: 구름(깊이감) + 멀리/가까이 새 + 풍선
    while((n.cloud||0)<(z===2?4:3)){ n.cloud=(n.cloud||0)+1; const d=Math.random()<0.5?1:-1, far=Math.random()<0.5;
      spawnAmb('cloud',{layer:'far',x:d<0?W+160:-160,y:H*(0.04+Math.random()*0.5),vx:d*(far?6+Math.random()*5:13+Math.random()*10),sz:far?0.35+Math.random()*0.25:0.7+Math.random()*0.5,far:far,life:1}); }
    if(Math.random()<dt*0.6) spawnBird();
    if(z===2 && (n.balloon||0)<1 && Math.random()<dt*0.5) spawnAmb('balloon',{layer:'far',x:-110,y:H*(0.28+Math.random()*0.28),vx:16+Math.random()*8,sz:0.42+Math.random()*0.14,life:1});
  } else if(z===4){ // 꿈/우주: 별 반짝임 + 별똥별 + 떠다니는 우주냥이(컨텍스트, 벚꽃 없음)
    while((n.twinkle||0)<20){ n.twinkle=(n.twinkle||0)+1; spawnAmb('twinkle',{layer:'far',x:Math.random()*W,y:Math.random()*H*0.85,sz:0.05+Math.random()*0.08,spd:1.4+Math.random()*2.2,life:1}); }
    if(Math.random()<dt*0.32) spawnAmb('shoot',{layer:'far',x:Math.random()*W*0.7,y:H*(0.04+Math.random()*0.3),vx:170+Math.random()*120,vy:70+Math.random()*60,sz:0.17,life:1.3});
    if((n.spacecat||0)<1 && Math.random()<dt*0.6) spawnAmb('spacecat',{layer:'far',x:Math.random()*W,y:H*(0.2+Math.random()*0.45),vx:(Math.random()-0.5)*24,vy:(Math.random()-0.5)*14,vr:(Math.random()-0.5)*0.4,sz:0.5,rot:0,life:1});
  }
  // 굴뚝 연기 — 배경 굴뚝(bg_j_5)에 합성, 월드 고도 기준이라 배경과 함께 스크롤하며 굴뚝에서 피어오름
  if(bgScrollDisp>AY_CHIMNEY-H/bgBH()-0.6 && bgScrollDisp<AY_CHIMNEY+0.4 && Math.random()<dt*3.6)
    spawnAmb('smoke',{ax:X_CHIMNEY+(Math.random()-0.5)*0.03, ay:AY_CHIMNEY, rise:0.5+Math.random()*0.22, sz:0.12+Math.random()*0.1, grow:0.15, life:3.8});
  // 머그컵 김 — 선반 머그컵(bg_j_2)에 합성, 실내에서 모락모락 피어오르는 살아있는 디테일
  if(bgScrollDisp<AY_MUG+0.35 && Math.random()<dt*2.6)
    spawnAmb('smoke',{ax:X_MUG+(Math.random()-0.5)*0.012, ay:AY_MUG+0.04, rise:0.32+Math.random()*0.12, sz:0.06+Math.random()*0.04, grow:0.055, life:2.4});
  for(let i=amb.length-1;i>=0;i--){ const p=amb[i];
    if(p.type==='smoke'){ p.ay+=p.rise*dt; p.sz+=p.grow*dt; p.life-=dt; if(p.life<=0)amb.splice(i,1); }   // 월드 고도 상승(굴뚝/머그컵에 합성, 배경과 동기 스크롤)
    else if(p.type==='petal'){ p.y+=p.vy*dt; p.x+=Math.sin(p.t*2+p.ph)*p.sway*dt; if(p.y>H+34||z!==1)amb.splice(i,1); }   // 벚꽃은 지붕(정원)에서만 — 하늘/우주로 새지 않게 컨텍스트 컬링
    else if(p.type==='cloud'){ p.x+=p.vx*dt; if((p.vx>0&&p.x>W+170)||(p.vx<0&&p.x<-170)||z<2||z>3)amb.splice(i,1); }
    else if(p.type==='bird'){
      if(p.ay!==undefined){ p.ax+=p.vax*dt; const fy=featSY(p.ay); if(p.ax<0.24||p.ax>0.76||fy<-60||fy>H+60)amb.splice(i,1); }   // 창문 틈 가로지르는 새(월드 앵커)
      else { p.x+=p.vx*dt; p.y+=Math.sin(p.t*2)*8*dt; if(p.x>W+100||p.x<-100)amb.splice(i,1); }
    }
    else if(p.type==='balloon'){ p.x+=p.vx*dt; p.y+=Math.sin(p.t*1.2+p.ph)*14*dt; if(p.x>W+130||z<2||z>3)amb.splice(i,1); }   // 풍선 둥실 떠다님
    else if(p.type==='twinkle'){ if(z!==4)amb.splice(i,1); }
    else if(p.type==='shoot'){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; if(p.life<=0)amb.splice(i,1); }
    else if(p.type==='spacecat'){ p.x+=p.vx*dt; p.y+=p.vy*dt+Math.sin(p.t*0.8+p.ph)*7*dt;   // 우주냥이: 무중력 표류 + 살짝 위아래 + 천천히 회전(vr)
      if(p.x<-130)p.x=W+130; if(p.x>W+130)p.x=-130; if(p.y<-130)p.y=H+130; if(p.y>H+130)p.y=-130;
      if(z!==4)amb.splice(i,1); }
  }
  if(amb.length>140) amb.splice(0,amb.length-140);
}
function drawAmbient(layer){
  for(const p of amb){ if((p.layer||'far')!==layer) continue;
    let im=ambImg(p.type);
    if(p.type==='bird'){ const ff=[1,2,3,2][Math.floor(p.t*(p.far?7:11))%4]; im=IMG['amb_bird'+ff]||IMG['amb_bird']||im; }   // 스프라이트 날갯짓 사이클
    if(p.type==='spacecat' && IMG['amb_spacecat_wave'] && Math.floor(p.t*1.2)%2) im=IMG['amb_spacecat_wave'];               // 우주냥 손 흔들기(2프레임)
    if(!im||!im.width) continue;
    let alpha=1, sc=p.sz;
    if(p.type==='smoke') alpha=Math.max(0,Math.min(0.72,p.t<0.4?p.t/0.4*0.72:p.life/4.0*0.72));  // 페이드인 후 천천히 사라짐
    else if(p.type==='twinkle'){ const k=Math.abs(Math.sin(p.t*p.spd+p.ph)); alpha=0.25+0.65*k; sc=p.sz*(0.65+0.6*k); }
    else if(p.type==='cloud') alpha=p.far?0.55:0.85;   // 먼 구름은 흐릿하게(깊이감)
    else if(p.type==='bird') alpha=p.far?0.6:0.95;       // 먼 새는 흐릿
    else if(p.type==='shoot') alpha=Math.max(0,p.life/1.3);
    let px=p.x, py=p.y;
    if(p.type==='smoke'){ px=p.ax*W+Math.sin(p.t*1.3+p.ph)*9; py=featSY(p.ay); if(py<-120||py>H+120) continue; }   // 월드→화면(굴뚝/머그컵과 동기)
    else if(p.type==='bird' && p.ay!==undefined){ px=p.ax*W; py=featSY(p.ay)+Math.sin(p.t*2+p.ph)*4; if(py<-60||py>H+60) continue; }   // 창문 합성 새
    const w=im.width*sc, h=im.height*sc;
    ctx.save(); ctx.globalAlpha=alpha; ctx.translate(px,py);
    if(p.flip) ctx.scale(-1,1);
    if(p.vr!==undefined) ctx.rotate(p.t*p.vr);
    ctx.drawImage(im, Math.round(-w/2), Math.round(-h/2), Math.ceil(w), Math.ceil(h));
    ctx.restore();
  }
}
// 존별 배경 데코 (발판이 아닌 배경에서 움직임) — 지붕 친구냥 손흔들기, 노을 등불 흔들림
// 배경의 친구냥 — 존마다 딱 1마리씩, 서로 다른 색, 배경에 있을 법한 자리에 합성(월드 고도 앵커, 2프레임 손짓)
const FRIENDS=[
  {a:'amb_friend_a', b:'amb_friend_b', ay:AY_FRIEND, x:X_FRIEND, h:1.45},          // 지붕 위 친구냥(흑백) — 칠해진 지붕에
  {a:'amb_kite_a',   b:'amb_kite_b',   ay:5.9,       x:0.68, h:1.9},               // 하늘: 연 타는 냥(회색 태비)
  {a:'amb_dusk_a',   b:'amb_dusk_b',   ay:7.9,       x:0.32, h:1.9},               // 노을: 열기구 탄 냥(크림)
];
function drawDeco(){
  const t=coinAnimT;
  for(const f of FRIENDS){
    const fy=featSY(f.ay);

function drawBackground(){

    const A=IMG[bgFrame(i)], B=IMG[bgFrame(i+1)]; if(!A||!B||!A.width||!B.width) continue;
    const yb=Math.round(H-(i-s+1)*bh);                        // 경계 = 프레임 i의 윗변
    for(let k=0;k<STR;k++){ const a=1-(k+0.5)/STR, hh=f/STR, yy=yb+k*hh;   // B 아랫부분 → 경계 아래로(1→0)

      ctx.globalAlpha=a; ctx.drawImage(B,0,sy,B.width,sh,0,Math.round(yy),bw,Math.ceil(hh)+1); }
    for(let k=0;k<STR;k++){ const a=(k+0.5)/STR, hh=f/STR, yy=yb-f+k*hh;   // A 윗부분 → 경계 위로(0→1)
      const sy=(k/STR)*fr*A.height, sh=fr*A.height/STR;
      ctx.globalAlpha=a; ctx.drawImage(A,0,sy,A.width,sh,0,Math.round(yy),bw,Math.ceil(hh)+1); }
    ctx.globalAlpha=1;
  }

}
const ANCHOR=0.62;            // 플레이어 화면상 세로 위치(낮게 고정 → 시작 시 지면 가깝고, 올라도 안 올라감)
const footCache={};           // 프레임별 최하단 불투명 픽셀 y (발 고정용)
function frameFootY(key, im){
  if(footCache[key]!=null) return footCache[key];
  let r=CHAR_OY;
  try{ const oc=document.createElement('canvas'); oc.width=im.width; oc.height=im.height;
    const o=oc.getContext('2d',{willReadFrequently:true}); o.drawImage(im,0,0);
    const d=o.getImageData(0,0,im.width,im.height).data;
    for(let y=im.height-1;y>=0;y--){ let op=false;
      for(let x=0;x<im.width;x++){ if(d[(y*im.width+x)*4+3]>16){op=true;break;} }
      if(op){ r=y; break; } } }catch(e){}

}
function sx_(gx,camGx){ return Math.round(W*0.5+(gx-camGx)*STEP_X); }

function drawProp(s, sx, sy, blockH){

  const t=p.reactT, r=p.reacted;
  const h=Math.round(STEP_X*(p.type==='friend'?1.2:0.95)), w=Math.round(h*(im.width/im.height));
  const topY=sy-blockH/2;
  let ox=0, oy=0, rot=0, alpha=1, sc=1;
  if(!r){ oy=Math.sin(coinAnimT*2+sx*0.05)*STEP_X*0.05; }
  else if(p.type==='plant'){ rot=Math.min(1.5,t*3.2); ox=Math.min(STEP_X,t*STEP_X*1.3); oy=t>0.45?(t-0.45)*(t-0.45)*H*1.4:0; alpha=t>1.3?Math.max(0,1-(t-1.3)*1.5):1; }
  else if(p.type==='friend'){ oy=-Math.abs(Math.sin(t*9))*STEP_X*0.2*Math.max(0,1-t*0.5); }
  else if(p.type==='balloon'){ oy=-t*t*H*0.4; ox=Math.sin(t*3.5)*STEP_X*0.35; alpha=Math.max(0,1-t*0.55); }
  else if(p.type==='lantern'){ rot=Math.sin(t*7)*0.32*Math.max(0,1-t*0.45); }
  else if(p.type==='star'){ ox=t*t*STEP_X*3; oy=-t*t*H*0.5; alpha=Math.max(0,1-t*0.7); sc=1+t*0.4; }
  if(alpha<=0) return;

}
function lerp(a,b,t){ return a+(b-a)*t; }
function easeIO(t){ t=t<0?0:t>1?1:t; return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
// 꿈 북엔드 — 영혼이 자는 몸에서 떠올라 놀고(등반), 끝나면 스르륵 몸으로 다시 들어가 잠

function drawBookendCat(){
  let pA,pB,blend=0,sqY=1,K=4.6,soul=0;
  const cushX=X_CUSHION*W, cushY=featSY(AY_CUSHION);                              // 방석(자는 자리) — 배경과 동기 스크롤
  const stepX=W*0.5, stepY=H*ANCHOR - STEP_X*BLOCK_AR*0.5 + STEP_X*CHAR_FOOT_SINK; // 첫 발판(플레이 시작 위치)와 정확히 일치
  let sx, footY;
  if(state==='ready'||state==='sleep'||state==='homewake'){ pA=pB='sleep'; sx=cushX; footY=cushY; sqY=1+Math.sin(coinAnimT*1.6)*0.022; }
  else if(state==='wake'){ const u=easeIO(wakeT/1.0);                             // 영혼이 방석에서 떠올라 첫 발판으로 둥실 이동
    sx=lerp(cushX,stepX,u); footY=lerp(cushY,stepY,u)-Math.sin(u*Math.PI)*STEP_X*0.85;  // 살짝 떠오르는 아치
    K=lerp(4.6,4.25,u); soul=Math.sin(u*Math.PI);                                // 떠 있는 동안 살짝 반투명(영혼)
    if(u<0.5){ pA='sleep'; pB='wake'; blend=u/0.5; } else { pA='wake'; pB='idle_1'; blend=(u-0.5)/0.5; } }
  else { const u=easeIO(returnT/1.1);                                            // return: 첫 발판→방석으로 스르륵 내려와 몸으로 들어가 잠
    sx=lerp(stepX,cushX,u); footY=lerp(stepY,cushY,u)-Math.sin(u*Math.PI)*STEP_X*0.5;
    K=lerp(4.25,4.6,u); soul=Math.sin(u*Math.PI);
    if(u<0.4){ pA='drop_4'; pB='wake'; blend=u/0.4; } else { pA='wake'; pB='sleep'; blend=(u-0.4)/0.6; } }
  const S=(STEP_X*K*charRenderScale())/CHAR_D; sx=Math.round(sx); footY=Math.round(footY);

}

// === 구름잠 v2 플레이 비주얼: 고도별 꿈하늘 + 시차 구름 + 별 ===
function _hx(c){ return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]; }
function _lerpHex(a,b,t){ const A=_hx(a),B=_hx(b); return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')'; }
const SKY=[['#bfe6f7','#eaf8ff',0],['#7cc4ee','#cfeefb',0],['#f6c79a','#ffe7c8',0],['#6a5e9c','#caa0bc',0.45],['#1b2249','#3c3568',1]];  // dawn/day/sunset/dusk/night
function skyAt(alt){ const n=SKY.length, fb=((Math.floor(alt)%n)+n)%n, nb=(fb+1)%n, f=alt-Math.floor(alt);
  return { top:_lerpHex(SKY[fb][0],SKY[nb][0],f), bot:_lerpHex(SKY[fb][1],SKY[nb][1],f), star:SKY[fb][2]+(SKY[nb][2]-SKY[fb][2])*f }; }
function drawSkyBg(){

function drawCloudLayer(cl,scale,par,alpha){

// 구름 발판 1개 그리기(현재/길/선택). type: solid|reward|cloud(미끄럼). targeted=선택 미리보기
function drawPlat(sx,sy,o,opts){

    if(o.type==='cloud'){                    // 미끄러운 비구름 — 부드러운 푸른 윤기 + 빗방울

    }

      ctx.drawImage(ci, sx-iw/2, sy-ch*0.30-ih+bob, iw, ih); } }

function render(){

    drawBackground(); const u=easeIO(Math.min(1,wakeT/1.0));

    drawBookendCat(); return;
  }
  if(state==='return'){  // 꿈 퇴장: 구름이 걷히며 방으로 돌아와 잠

  const camGy=(state==='rocket')?rocketCamGy:p.gy;   // 로켓 상승 중엔 카메라가 위로 패닝 → 발판이 아래로 흐름(끝에 목적지 발판이 중앙·ANCHOR로 도착)
  drawSkyBg();                                              // 꿈하늘 + 시차 구름

  for(let i=lo;i<player.idx;i++){ const s=stairs[i], sx=sx_(s.gx,camGx), sy=sy_(s.gy,camGy);   // 지나온 구름 — 아래로 옅게
    if(sy<-STEP_X*2||sy>H+STEP_X*2) continue;

  { const s=stairs[player.idx]; drawPlat(sx_(s.gx,camGx),sy_(s.gy,camGy),{type:(s.type==='cloud')?'cloud':'solid'},{alpha:1}); }   // 현재 구름(고양이 발밑)
  if(state==='play'){ for(let k=0;k<offers.length;k++){ const o=offers[k]; drawPlat(sx_(o.gx,camGx),sy_(o.gy,camGy),o,{alpha:0.98,targeted:dragLane===k}); } }   // 선택지 2개(머리 위)
  // 효과

    // 화면크기 기준 목표 폭으로 스케일(고해상 생성 에셋이 화면을 덮지 않도록)

  if(state==='play') drawHud();
  if(state==='play' && combo>=5) drawCombo();
  if(state==='countdown') drawCountdown();   // 3·2·1 (게이지 멈춘 채로 숨 고르기)
}
function drawCombo(){    // 콤보 카운터(숙련 보상 연출) — 게이지 위에 작게
  const pop=comboPopT>0?1+Math.min(0.4,comboPopT*0.9):1;
  const hot=combo>=50?'#ff8f3a':combo>=25?'#ffb347':'#ffd24a';
  ctx.save(); ctx.translate(W*0.5, 150); ctx.scale(pop,pop);   // 게이지 바(96~130px) 바로 아래
  ctx.font='900 '+Math.round(Math.min(STEP_X,46)*0.46)+'px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineJoin='round'; ctx.lineWidth=Math.round(STEP_X*0.12); ctx.strokeStyle='#5a3a1a'; ctx.strokeText(combo+' COMBO',0,0);
  ctx.fillStyle=hot; ctx.fillText(combo+' COMBO',0,0);
  ctx.restore();
}
function drawRocket(){    // 로켓 + 그 위에 탄 신난 고양이 + 아래로 길게 뻗는 연기 꼬리
  const im=IMG['prop_rocket']; if(!im||!im.width) return;
  const u=easeIO(Math.min(1,rocketT/ROCKET_DUR));
  const rh=STEP_X*5.0, rw=rh*im.width/im.height;
  // 착지 기준점(=카운트다운 때 고양이가 서는 발판 위치)와 정확히 일치하도록 footBase 계산 → 위치 안 튐
  const footBase=Math.round(H*ANCHOR - STEP_X*BLOCK_AR*0.5 + STEP_X*CHAR_FOOT_SINK);
  const whoosh=-Math.sin(u*Math.PI)*H*0.34;                 // 시원하게 솟구쳐 올랐다가 발판으로 내려앉음
  const bob=Math.sin(coinAnimT*9)*2, shake=Math.sin(coinAnimT*45)*1.4*(1-u*0.7);
  const cx=Math.round(W*0.5), catFoot=Math.round(footBase+whoosh+bob), rcy=catFoot-rh*0.30;  // 고양이 발이 로켓 윗부분(시트)에
  const rkAlpha=u>0.86?Math.max(0,(1-u)/0.14):1;            // 착지 직전 로켓 페이드아웃
  // 연기 꼬리 (로켓 아래로 점점 옅고 크게) — 로켓을 따라다님
  const sm=IMG['amb_smoke'];
  if(sm&&sm.width){ for(let k=0;k<8;k++){ const tt=((coinAnimT*1.7+k*0.28)%1);
    const py=rcy+rh*0.34+tt*H*0.5, a=(1-tt)*0.45*rkAlpha, ss=(0.4+tt*1.05)*STEP_X*1.3;
    ctx.save(); ctx.globalAlpha=a; ctx.translate(cx+shake+Math.sin(k*1.7+coinAnimT*3)*9, py);
    ctx.drawImage(sm,-ss/2,-ss/2,ss,ss); ctx.restore(); } }
  ctx.save(); ctx.globalAlpha=rkAlpha; ctx.translate(cx+shake, rcy+bob); ctx.drawImage(im,-rw/2,-rh/2,rw,rh); ctx.restore();
  const cim=IMG['c_'+selectedChar+'_ride']||IMG['c_'+selectedChar+'_wake']||IMG['c_'+selectedChar+'_idle_1'];   // 신난 탑승 포즈(없으면 폴백)
  if(cim&&cim.width){ const S=(STEP_X*3.9*charRenderScale())/CHAR_D;
    ctx.save(); ctx.translate(cx+shake,catFoot); ctx.drawImage(cim,-CHAR_CX*S,-CHAR_FOOT_Y*S,CHAR_CW*S,CHAR_CH*S); ctx.restore(); }
}
function drawCountdown(){
  const n=Math.max(1,Math.ceil(countT/COUNT_STEP)), frac=(countT/COUNT_STEP)%1;   // 각 숫자 1→0 진행
  const pop=1.0+0.45*(1-frac), alpha=Math.min(1,frac*3.2);
  ctx.save(); ctx.translate(W*0.5,H*0.34); ctx.scale(pop,pop); ctx.globalAlpha=alpha;
  ctx.font='900 '+Math.round(STEP_X*2.6)+'px -apple-system,BlinkMacSystemFont,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.lineJoin='round'; ctx.lineWidth=Math.round(STEP_X*0.22); ctx.strokeStyle='#5a3a1a'; ctx.strokeText(n,0,0);
  ctx.fillStyle='#ffcf5a'; ctx.fillText(n,0,0);
  ctx.restore();
}

async function readImageFile(file){
  const data=await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  const image=await new Promise((res,rej)=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=rej; img.src=data; });
  return {data,image};
}
function imageToDataUrl(im,size,mode,mime,quality){
  const cv=document.createElement('canvas'), g=cv.getContext('2d'); cv.width=size; cv.height=size;
  const s=mode==='cover'?Math.max(size/im.width,size/im.height):Math.min(size/im.width,size/im.height), w=im.width*s, h=im.height*s;
  g.fillStyle='#fff'; g.fillRect(0,0,size,size); g.drawImage(im,(size-w)/2,(size-h)/2,w,h);
  return cv.toDataURL(mime,quality);
}
async function generationPhotoData(file,{compact=false}={}){
  const loaded=await readImageFile(file), im=loaded.image;
  const canUseOriginal=!compact && /^image\/(png|jpe?g|webp)$/i.test(file.type||'') && file.size<=DIRECT_GENERATION_MAX;
  return {
    input: canUseOriginal?loaded.data:imageToDataUrl(im,1024,'contain','image/jpeg',0.9),
    preview: imageToDataUrl(im,180,'cover','image/jpeg',0.78)
  };
}
async function handleCatPhoto(){

async function generateCustomCharacter(){
  const btn=document.getElementById('genBtn');
  if(!pendingGenerationPhoto){ setGenStatus('고양이 사진을 먼저 선택해 주세요.'); return; }
  const label=btn.textContent; btn.disabled=true; btn.textContent='생성 중';
  setGenStatus('캐릭터 생성 중입니다...');
  const clientStartedAt=performance.now();
  try{
    const res=await fetch('/api/generate-cat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:pendingGenerationPhoto,name:'My Cat'})});
    const data=await res.json().catch(()=>({}));
    const sheet=data.sprite_sheet||data.sprite;
    if(!res.ok||!sheet) throw new Error(data.error||'캐릭터 생성 실패');
    window.__lastGenerationSheet=sheet;
    const clientElapsedMs=Math.round(performance.now()-clientStartedAt);
    const generationMeta={
      backend:data.backend,
      response_model:data.response_model,
      model:data.model,
      size:data.size,
      quality:data.quality,
      action:data.action,
      timing:data.timing,
      usage:data.usage,
      estimated_cost_usd:data.estimated_cost_usd,
      client_elapsed_ms:clientElapsedMs,
      client_elapsed_seconds:Number((clientElapsedMs/1000).toFixed(3))
    };
    window.__lastGenerationMeta=generationMeta;
    try{ localStorage.setItem('is_last_generation_meta',JSON.stringify(generationMeta)); }catch(e){}
    let frames;
    try{
      frames=await splitGeneratedSpriteSheet(sheet,data.sheet_layout);
    }catch(extractError){
      generationMeta.extraction_error=extractError&&extractError.message?extractError.message:String(extractError);
      setGenStatus('자동 보정 중입니다...');
      try{
        frames=await splitGeneratedSpriteSheetByRows(sheet,data.sheet_layout);
      }catch(rowError){
        generationMeta.row_fallback_error=rowError&&rowError.message?rowError.message:String(rowError);
        frames=null;
      }
    }
    generationMeta.extraction_mode=window.__lastExtractionMode||'auto';
    frames=repairGeneratedFrames(frames);
    if(!frames){
      frames=await makeSingleGeneratedFallbackFrames(sheet);
      generationMeta.extraction_mode=window.__lastExtractionMode||'single_sheet_fallback';
    }
    if(!frames) throw new Error('생성 이미지를 게임 프레임으로 변환하지 못했습니다. 다시 생성해 주세요.');
    const qa=await validateGeneratedFrames(frames);
    generationMeta.quality_gate=qa;
    window.__lastGenerationMeta=generationMeta;
    try{ localStorage.setItem('is_last_generation_meta',JSON.stringify(generationMeta)); }catch(e){}
    await setGeneratedFrames(frames,true);
    const sec=data.timing&&data.timing.elapsed_seconds?data.timing.elapsed_seconds:generationMeta.client_elapsed_seconds;
    if(qa.ok) setGenStatus('15프레임 생성 완료 ('+sec+'초). 이 캐릭터로 바로 플레이할 수 있습니다.');
    else setGenStatus('생성 완료, 일부 프레임을 자동 보정했습니다. 바로 플레이할 수 있습니다.');
  }catch(e){
    setGenStatus(e.message||'캐릭터 생성 실패');
  }finally{
    btn.disabled=false; btn.textContent=label;
  }
}

async function handleInviteSubmit(){
  const btn=document.getElementById('genBtn');
  const name=catInviteName();
  if(!invitePhotoCount()){
    setInviteStep('photo');
    setGenStatus('사진을 먼저 올려 주세요.','error');
    return;
  }
  if(!name){
    setInviteStep('name');
    setGenStatus('냥이 이름을 입력해 주세요.','error');
    document.getElementById('catNameInput')?.focus();
    return;
  }

  if(!draft){
    setInviteStep('invite');

  }
  btn.disabled=true;
  setGenStatus('저장됐어요. Google 계정으로 이어서 신청할 수 있어요.','ok');

    await showGoogleLogin();
    setInviteStep('login');

    setInviteStep('invite');
    setGenStatus(e.message||'Google 로그인을 준비하지 못했습니다.','error');

function loadGoogleIdentity(){

      const s=document.createElement('script');

      s.async=true;
      s.defer=true;
      s.onload=()=>resolve();
      s.onerror=()=>reject(new Error('Google 로그인 스크립트를 불러오지 못했습니다.'));

    submitInFlight=false;
  }
}

(function buildCharSel(){

let landingDemoTimer=null;

}
function runDemo(){
  reset(); startBgm(); showIntro();
  let steps=0;
  const timer=setInterval(()=>{
    if(state!=='play'){ clearInterval(timer); return; }
    if(steps<28){ chooseLane(pickDefaultLane()); steps++; return; }
    chooseLane(Math.random()<0.5?0:1); clearInterval(timer);
  },190);
}
function runSlowDemo(keepStartOverlay=false){
  // 선택화면은 자동 등반 데모 대신 "바닥에서 자는 고양이"(꿈 컨셉)

}

// QA 훅
window.__g={ act, reset, start(){reset();},
  get stairs(){return stairs}, get player(){return player},
  get score(){return score}, get coins(){return coins}, get gauge(){return gauge},
  get state(){return state}, get guageSpeed(){return guageSpeed},
  get char(){return selectedChar}, setChar(id){ selectedChar=id; updatePickupHudIcon(); },
  get generated(){return hasGeneratedCharacter()}, get generatedFrames(){return Object.keys(generatedCharFrames)},
  setGenerated:setGeneratedCharacter, clearGenerated:clearGeneratedCharacter,
  stepCorrect(){ chooseLane(pickDefaultLane()); },
  setBg(n){ bgScroll=n; bgScrollDisp=n; }, get bgmPaused(){return BGM.paused},
  get zone(){return curAmbZone()}, get amb(){return amb}, get W(){return W}, get H(){return H},
  pumpAmb(z,n){ bgScroll=z; bgScrollDisp=z; for(let k=0;k<(n||40);k++) updateAmbient(0.05); return amb.map(p=>p.type); },
  qaState(s,t){ state=s; sleepT=t||0; wakeT=t||0; returnT=t||0; },
  testRocket(){ if(state!=='play'){ reset(); } startRocket(); },
  qaRocketFreeze(u){ reset(); for(let k=0;k<24 && state==='play';k++)chooseLane(pickDefaultLane()); state='play'; startRocket(); rocketT=u*ROCKET_DUR;
    const e=easeIO(Math.min(1,rocketT/ROCKET_DUR)); rocketCamGy=rocketFromGy+(rocketToGy-rocketFromGy)*e; rocketCamGx=rocketFromGx+(rocketToGx-rocketFromGx)*e; bgScroll=bgScrollDisp=rocketFromBg+(rocketToBg-rocketFromBg)*e; },
  qaCountdownShow(secs){ reset(); for(let k=0;k<24 && state==='play';k++)chooseLane(pickDefaultLane()); player.idx+=ROCKET_BOOST; bgScroll=bgScrollDisp=altAtStair(player.idx); state='countdown'; countT=secs; },
  qaRocketResume(){ reset(); for(let k=0;k<24 && state==='play';k++)chooseLane(pickDefaultLane()); startRocket();
    player.idx=rocketToIdx; stairs.length=player.idx+1; stairs[player.idx].turn=0; if(gen.grant)gen.grant(2); ensureStairs(player.idx+60);  // 착지(프레임 로직과 동일)
    state='play'; started=true; gauge=GUAGE_MAX;
    const landingTurn=stairs[player.idx].turn, n1=stairs[player.idx+1]&&stairs[player.idx+1].turn, n2=stairs[player.idx+2]&&stairs[player.idx+2].turn;
    chooseLane(pickDefaultLane());  // 재개 후 한 칸
    return JSON.stringify({landingTurn,n1,n2,survivedUpPress:state==='play'}); },
  get rocketT(){return rocketT}, get countT(){return countT}, get combo(){return combo},
  qaGenStats(n){ const g=makeStairGen({seed:12345}); let turns=0,run=0,maxRun=0,consec=0,maxConsec=0,runs=0,runSum=0;
    for(let k=0;k<n;k++){ const b=g(); run++; if(b===1){ turns++; if(run===1){consec++; if(consec>maxConsec)maxConsec=consec;} else consec=0; runs++; runSum+=run; if(run>maxRun)maxRun=run; run=0; } }
    return { n, pTurn:+(turns/n).toFixed(3), meanRun:+(runSum/Math.max(1,runs)).toFixed(2), maxConsecSingleTurn:maxConsec }; },
  qaGenSeg(d,n){ const g=makeStairGen({seed:777}); for(let k=0;k<d;k++)g(); let s=''; for(let k=0;k<n;k++)s+=g(); return s; },
  forceBird:(low)=>spawnBird(low), forceSpawn:(t,o)=>spawnAmb(t,o) };
